# ReviewHub — docker-compose for self-hosted deployment.
#
# Run:     docker compose up -d --build
# Logs:    docker compose logs -f
# Backup:  docker compose exec api node scripts/backup-db.js
#
# Before starting, create ./server/.env with the production values:
#   JWT_SECRET=<48+ random bytes base64url>
#   CLIENT_URL=https://yourapp.com
#   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS, SMTP_FROM (for emails)
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_OAUTH_REDIRECT_URI (OAuth)
#   ANTHROPIC_API_KEY (AI drafts) — optional; template fallback if unset
#   LEMONSQUEEZY_* (billing) — optional; billing disabled if unset
#   ADMIN_EMAIL (admin endpoint gate) — optional
#   SENTRY_DSN (error forwarding) — optional

services:
  api:
    build: ./server
    restart: unless-stopped
    init: true                 # reap zombies, forward SIGTERM cleanly
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
    volumes:
      - rh-data:/app/data      # SQLite file + WAL
      - rh-backups:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  web:
    build: ./client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  rh-data:
  rh-backups:
