name: CI

# Runs server + client test suites and a client production build on every
# push and pull-request to main. Each job is independent so a server flake
# doesn't mask a client regression.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel in-flight runs for the same branch — saves CI minutes and
  # avoids wasting time on a commit the author has already superseded.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: server · node:test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        env:
          NODE_ENV: test
          DATABASE_PATH: ':memory:'
          # Stable dummy values so tests relying on these keys don't branch on absence
          JWT_SECRET: 'ci-testing-secret-must-be-at-least-32-chars-long-xxxxxxxxx'
          CLIENT_URL: 'http://test.local'
        run: npm test

  client:
    name: client · vitest + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        run: npm ci
      - name: Test (vitest)
        run: npx vitest run
      - name: Build (vite)
        run: npx vite build
      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: client-dist
          path: client/dist
          retention-days: 14

  # Simple build-doesn't-crash check on the Docker images. Catches
  # Dockerfile regressions early without publishing anything.
  docker:
    name: docker · build-only
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: reviewhub-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: reviewhub-client:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
