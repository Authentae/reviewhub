<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ReviewHub — The reply layer for local business</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ReviewHub palette — research-backed
       Primary: deep teal-blue (trust + hospitality warmth)
       Grounding: warm ivory + near-black ink (timeless, legible)
       Accent: warm ochre (hospitality, 5-star-rating color)
       Semantic: sage (positive), terracotta (negative) */

    --paper: oklch(0.985 0.006 85);
    --paper-2: oklch(0.965 0.010 82);
    --cream: oklch(0.955 0.022 82);
    --ink: oklch(0.18 0.02 220);
    --ink-2: oklch(0.34 0.025 220);
    --ink-3: oklch(0.54 0.02 220);
    --rule: oklch(0.88 0.012 220);
    --rule-2: oklch(0.78 0.015 220);

    /* Identity colors */
    --teal: oklch(0.42 0.09 220);          /* primary */
    --teal-deep: oklch(0.32 0.08 220);
    --teal-soft: oklch(0.92 0.035 220);
    --ochre: oklch(0.75 0.13 75);          /* accent */
    --ochre-deep: oklch(0.64 0.14 65);
    --ochre-soft: oklch(0.95 0.045 75);

    /* Semantic */
    --sage: oklch(0.58 0.10 155);
    --sage-soft: oklch(0.93 0.035 155);
    --clay: oklch(0.58 0.14 32);
    --clay-soft: oklch(0.93 0.04 32);

    /* Legacy aliases — map old names onto new palette so existing CSS stays valid */
    --indigo: var(--teal);
    --indigo-soft: var(--teal-soft);
    --amber: var(--ochre);
    --amber-deep: var(--ochre-deep);
    --warm: var(--ochre);
    --emerald: var(--sage);
    --emerald-soft: var(--sage-soft);
    --rose: var(--clay);
    --rose-soft: var(--clay-soft);
    --sky: var(--teal);
    --plum: var(--teal-deep);
    --ok: var(--sage);
    --bad: var(--clay);
    --star: var(--ochre);

    --accent: var(--teal);
    --accent-soft: var(--teal-soft);

    --density: 1;
    --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
    --sans: "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  [data-theme="dark"] {
    --paper: oklch(0.15 0.015 220);
    --paper-2: oklch(0.20 0.018 220);
    --cream: oklch(0.23 0.025 75);
    --ink: oklch(0.97 0.008 85);
    --ink-2: oklch(0.85 0.012 220);
    --ink-3: oklch(0.62 0.02 220);
    --rule: oklch(0.28 0.02 220);
    --rule-2: oklch(0.38 0.02 220);
    --teal: oklch(0.68 0.12 220);
    --teal-soft: oklch(0.28 0.06 220);
    --ochre: oklch(0.80 0.12 75);
    --ochre-deep: oklch(0.72 0.13 70);
    --sage-soft: oklch(0.26 0.05 155);
    --clay-soft: oklch(0.28 0.07 32);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    font-size: 16px; line-height: 1.5;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  ::selection { background: var(--indigo); color: var(--paper); }

  .shell { max-width: 1320px; margin: 0 auto; padding: 0 48px; position: relative; }
  @media (max-width: 720px) { .shell { padding: 0 20px; } }

  .mono { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
  .italic { font-style: italic; font-family: var(--serif); }

  /* ————— NAV ————— */
  nav.top {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in oklab, var(--paper) 88%, transparent);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border-bottom: 1px solid color-mix(in oklab, var(--rule) 60%, transparent);
  }
  nav.top .bar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; height: 68px; }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
  .brand .mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-family: var(--serif); font-size: 22px; font-style: italic; line-height: 1;
    position: relative; overflow: hidden;
  }
  .brand .mark::after { content: ""; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-radius: 50%; background: var(--amber); }
  .brand .wm { font-family: var(--serif); font-size: 24px; letter-spacing: -0.01em; }
  .brand .wm em { font-style: italic; color: var(--ink-2); }

  .nav-links { display: flex; align-items: center; gap: 4px; background: var(--paper-2); border: 1px solid var(--rule); border-radius: 999px; padding: 4px; position: relative; }
  .nav-links a { text-decoration: none; color: var(--ink-2); font-size: 13.5px; font-weight: 500; padding: 7px 14px; border-radius: 999px; transition: color .2s; position: relative; z-index: 2; }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a.active { color: var(--ink); font-weight: 600; }
  .nav-links .pill {
    position: absolute; top: 4px; height: calc(100% - 8px);
    background: color-mix(in oklab, var(--ochre) 55%, var(--paper));
    border: 1px solid color-mix(in oklab, var(--ochre-deep) 45%, transparent);
    box-shadow: 0 2px 6px -2px color-mix(in oklab, var(--ochre-deep) 40%, transparent);
    border-radius: 999px; z-index: 1;
    transition: left .36s cubic-bezier(.2,.8,.2,1), width .36s cubic-bezier(.2,.8,.2,1), opacity .25s;
    pointer-events: none;
  }
  .nav-links .pill.hidden { opacity: 0; }
  .nav-cta { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }

  .nav-ping {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10.5px; color: var(--ink-3);
    letter-spacing: 0.06em; padding: 0 8px;
  }
  .nav-ping .ping-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--sage);
    box-shadow: 0 0 0 0 color-mix(in oklab, var(--sage) 55%, transparent);
    animation: ping 2.2s ease-out infinite;
  }
  @keyframes ping {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--sage) 60%, transparent); }
    70%  { box-shadow: 0 0 0 10px color-mix(in oklab, var(--sage) 0%, transparent); }
    100% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--sage) 0%, transparent); }
  }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600;
    cursor: pointer; text-decoration: none; border: 1px solid transparent;
    transition: all .18s ease; white-space: nowrap; letter-spacing: -0.005em;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: var(--indigo); transform: translateY(-1px); }
  .btn-amber { background: var(--amber); color: var(--ink); }
  .btn-amber:hover { background: var(--amber-deep); color: var(--paper); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--rule-2); }
  .btn-ghost:hover { background: var(--paper-2); border-color: var(--ink-3); }
  .btn-lg { padding: 14px 24px; font-size: 15px; }
  .btn svg { width: 14px; height: 14px; }

  @media (max-width: 860px) { .nav-links { display: none; } }

  /* ————— HERO — cream paper, indigo + amber ————— */
  .hero {
    position: relative; overflow: hidden;
    background: var(--cream);
    padding: calc(90px * var(--density)) 0 calc(60px * var(--density));
  }
  .hero-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 800px 400px at 70% 20%, color-mix(in oklab, var(--teal) 10%, transparent), transparent 70%),
      radial-gradient(ellipse 600px 300px at 10% 90%, color-mix(in oklab, var(--ochre) 16%, transparent), transparent 70%);
  }
  /* Graph-paper ruled grid */
  .hero-grid {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(to right, color-mix(in oklab, var(--ink) 5%, transparent) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in oklab, var(--ink) 5%, transparent) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 40%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 40%, transparent 90%);
    opacity: 0.55;
  }
  [data-theme="dark"] .hero-grid {
    background-image:
      linear-gradient(to right, color-mix(in oklab, var(--paper) 6%, transparent) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in oklab, var(--paper) 6%, transparent) 1px, transparent 1px);
  }
  /* Vignette to ground content */
  .hero-vignette {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse 90% 75% at 50% 55%, transparent 55%, color-mix(in oklab, var(--ink) 8%, transparent) 100%);
  }
  /* Decorative ampersand */
  .hero-amp {
    position: absolute; top: 40px; right: 5%; z-index: 0; pointer-events: none;
    font-family: var(--serif); font-style: italic;
    font-size: clamp(220px, 24vw, 420px);
    line-height: 0.8; letter-spacing: -0.04em;
    color: color-mix(in oklab, var(--teal) 12%, transparent);
    user-select: none;
  }
  /* Coordinates overlay — hospitality / location cue */
  .hero-coords {
    position: absolute; top: 140px; right: 5%; z-index: 1;
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em;
    color: color-mix(in oklab, var(--ink) 55%, transparent);
    text-transform: uppercase;
    padding: 14px 18px;
    border-left: 1px solid color-mix(in oklab, var(--ochre-deep) 55%, transparent);
  }
  .hero-coords .cx, .hero-coords .cy { color: var(--ink); font-weight: 500; }
  .hero-coords .cn { color: var(--ochre-deep); font-weight: 600; margin-top: 6px; }
  @media (max-width: 1200px) { .hero-coords { display: none; } .hero-amp { opacity: 0.7; } }
  @media (max-width: 720px) { .hero-amp { font-size: 180px; top: 20px; right: -20px; } }
  .hero-inner { position: relative; z-index: 1; }

  .hero-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; gap: 20px; flex-wrap: wrap; }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 6px 14px 6px 8px; border: 1px solid var(--rule-2); border-radius: 999px; background: var(--paper); }
  .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 4px color-mix(in oklab, var(--ok) 18%, transparent); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .6; transform: scale(0.9); } }

  .meta-right { display: flex; align-items: center; gap: 16px; }
  .meta-right .avatars { display: flex; }
  .meta-right .avatars span {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--cream);
    margin-left: -6px; display: grid; place-items: center;
    font-size: 10px; font-weight: 700; color: var(--paper);
  }
  .meta-right .avatars span:nth-child(1) { background: var(--rose); margin-left: 0; }
  .meta-right .avatars span:nth-child(2) { background: var(--sky); }
  .meta-right .avatars span:nth-child(3) { background: var(--emerald); }
  .meta-right .avatars span:nth-child(4) { background: var(--plum); }
  .meta-right .ct { font-size: 13px; color: var(--ink-2); }
  .meta-right .ct b { color: var(--ink); font-weight: 600; }

  h1.display {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(56px, 9vw, 148px);
    line-height: 0.94; letter-spacing: -0.035em;
    margin: 0 0 40px; color: var(--ink);
    text-wrap: balance; max-width: 16ch;
  }
  h1.display em { font-style: italic; color: var(--indigo); }
  h1.display .time {
    display: inline-flex; align-items: baseline; gap: 0.08em;
    font-style: italic; color: var(--ochre-deep);
    padding: 0 0.1em;
    background: linear-gradient(180deg, transparent 62%, color-mix(in oklab, var(--ochre) 42%, transparent) 62%, color-mix(in oklab, var(--ochre) 42%, transparent) 88%, transparent 88%);
    border-radius: 2px;
  }
  [data-theme="dark"] h1.display .time {
    color: var(--ochre);
    background: linear-gradient(180deg, transparent 58%, color-mix(in oklab, var(--ochre) 32%, transparent) 58%, color-mix(in oklab, var(--ochre) 32%, transparent) 92%, transparent 92%);
    text-shadow: 0 0 40px color-mix(in oklab, var(--ochre) 55%, transparent), 0 0 80px color-mix(in oklab, var(--ochre) 25%, transparent);
    padding: 0 0.1em;
    border-radius: 2px;
  }

  .hero-bottom { display: grid; grid-template-columns: 1.1fr 1.3fr; gap: 56px; align-items: flex-end; }
  @media (max-width: 1024px) { .hero-bottom { grid-template-columns: 1fr; gap: 40px; } }

  .lede { font-size: 19px; line-height: 1.55; color: var(--ink-2); max-width: 46ch; margin: 0 0 32px; }
  .lede b { color: var(--ink); font-weight: 600; }
  .lede mark { background: color-mix(in oklab, var(--amber) 45%, transparent); color: var(--ink); padding: 0 4px; border-radius: 3px; }

  .hero-cta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  .hero-proof { display: grid; grid-template-columns: repeat(3, auto); gap: 40px; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--rule); width: fit-content; }
  .hero-proof .metric .n { font-family: var(--serif); font-size: 40px; line-height: 1; letter-spacing: -0.02em; }
  .hero-proof .metric:nth-child(1) .n { color: var(--amber-deep); }
  .hero-proof .metric:nth-child(2) .n { color: var(--indigo); }
  .hero-proof .metric:nth-child(3) .n { color: var(--emerald); }
  .hero-proof .metric .n small { font-family: var(--sans); font-size: 16px; color: var(--ink-3); font-weight: 500; margin-left: 2px; }
  .hero-proof .metric .l { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px; }

  /* Card stack */
  .card-stack { position: relative; height: 460px; }
  @media (max-width: 1024px) { .card-stack { height: 520px; max-width: 480px; margin: 0 auto; } }

  .float-card {
    position: absolute; background: var(--paper);
    border: 1px solid var(--rule); border-radius: 18px;
    padding: 18px 20px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 30px 60px -30px color-mix(in oklab, var(--ink) 22%, transparent);
    transition: transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .3s;
    will-change: transform;
  }
  .float-card:hover { box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 40px 80px -30px color-mix(in oklab, var(--ink) 35%, transparent); }

  .fc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .fc-who { display: flex; align-items: center; gap: 10px; }
  .fc-avatar { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; color: white; font-size: 11px; font-weight: 700; }
  .fc-name { font-size: 14px; font-weight: 600; }
  .fc-plat { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 7px; border: 1px solid var(--rule); border-radius: 4px; }
  .fc-body { font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
  .fc-draft {
    margin-top: 12px; padding: 10px 12px; border-radius: 10px;
    background: color-mix(in oklab, var(--indigo) 6%, transparent);
    border: 1px dashed color-mix(in oklab, var(--indigo) 40%, var(--rule));
    font-size: 12.5px; color: var(--ink-2); line-height: 1.5;
  }
  .fc-draft-label { font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--indigo); font-weight: 600; margin-bottom: 4px; display: inline-flex; align-items: center; gap: 6px; }
  .fc-draft-label::before { content: "✦"; font-size: 11px; }

  .stars { display: inline-flex; gap: 2px; color: var(--amber); }

  @keyframes float-1 { 0%, 100% { transform: translate(0, 0) rotate(-4deg); } 50% { transform: translate(-4px, -6px) rotate(-4.5deg); } }
  @keyframes float-2 { 0%, 100% { transform: translate(0, 0) rotate(3deg); } 50% { transform: translate(6px, -4px) rotate(2.5deg); } }
  @keyframes float-3 { 0%, 100% { transform: translate(0, 0) rotate(-2deg); } 50% { transform: translate(-2px, -8px) rotate(-1.5deg); } }

  .float-card.a { top: 20px; left: 0; width: 320px; animation: float-1 6s ease-in-out infinite; }
  .float-card.b { top: 110px; right: 0; width: 300px; animation: float-2 7s ease-in-out infinite; }
  .float-card.c { top: 260px; left: 60px; width: 340px; animation: float-3 8s ease-in-out infinite; }

  .float-card .sent {
    position: absolute; top: -10px; right: -8px;
    background: var(--emerald); color: white;
    font-family: var(--mono); font-size: 9.5px; padding: 4px 9px; border-radius: 999px;
    letter-spacing: 0.08em; font-weight: 600;
    box-shadow: 0 4px 12px color-mix(in oklab, var(--emerald) 45%, transparent);
    display: flex; align-items: center; gap: 4px;
  }
  .float-card .sent::before { content: "✓"; font-size: 11px; }
  .float-card .sent.draft { background: var(--amber-deep); box-shadow: 0 4px 12px color-mix(in oklab, var(--amber-deep) 45%, transparent); }
  .float-card .sent.draft::before { content: "✦"; }

  /* ————— MARQUEE — dark ink band ————— */
  .marquee-section {
    padding: 32px 0; background: var(--ink); color: var(--paper);
    overflow: hidden; border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink);
    position: relative;
  }
  .marquee-section::before, .marquee-section::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 120px; z-index: 2; pointer-events: none;
  }
  .marquee-section::before { left: 0; background: linear-gradient(90deg, var(--ink), transparent); }
  .marquee-section::after  { right: 0; background: linear-gradient(-90deg, var(--ink), transparent); }

  .marquee-row {
    display: flex; gap: 48px; align-items: center; white-space: nowrap;
    animation: marquee 50s linear infinite;
    font-family: var(--serif); font-size: 34px; letter-spacing: -0.01em;
    animation-play-state: running;
  }
  .marquee-section:hover .marquee-row { animation-play-state: paused; }
  .marquee-row > span { display: inline-flex; align-items: center; gap: 48px; }

  .marquee-row .chunk {
    display: inline-flex; align-items: center; gap: 14px;
    padding: 6px 4px;
    transition: transform .25s cubic-bezier(.2,.8,.2,1);
    cursor: default;
  }
  .marquee-row .chunk:hover { transform: translateY(-3px); }
  .marquee-row .chunk:hover .plat { color: var(--platcolor, var(--ochre)); }
  .marquee-row .chunk:hover .count { opacity: 1; transform: translateX(0); }

  .marquee-row .plat {
    color: var(--paper); font-style: italic;
    transition: color .25s;
  }
  .marquee-row .star {
    color: var(--platcolor, var(--ochre));
    font-family: var(--sans); font-size: 22px; flex: none;
    filter: drop-shadow(0 0 8px color-mix(in oklab, var(--platcolor, var(--ochre)) 55%, transparent));
    animation: star-twinkle 3s ease-in-out infinite;
  }
  .marquee-row .chunk:nth-child(even) .star { animation-delay: 1.2s; }
  @keyframes star-twinkle {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.15) rotate(18deg); opacity: 0.85; }
  }

  .marquee-row .count {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: color-mix(in oklab, var(--paper) 55%, transparent);
    padding: 4px 10px; border-radius: 999px;
    border: 1px solid color-mix(in oklab, var(--paper) 18%, transparent);
    background: color-mix(in oklab, var(--paper) 6%, transparent);
    opacity: 0; transform: translateX(-8px);
    transition: opacity .25s, transform .25s;
  }
  .marquee-row .count b { color: var(--paper); font-weight: 600; }

  .marquee-row .sep {
    font-style: italic; color: color-mix(in oklab, var(--paper) 35%, transparent);
    font-family: var(--serif); font-size: 28px;
  }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ————— SECTIONS base ————— */
  .section { padding: calc(120px * var(--density)) 0; position: relative; }

  .section-head { display: grid; grid-template-columns: 220px 1fr; gap: 48px; margin-bottom: 64px; align-items: flex-end; }
  @media (max-width: 860px) { .section-head { grid-template-columns: 1fr; gap: 16px; } }
  .section-head .kicker { display: flex; flex-direction: column; gap: 10px; }
  .section-head .num { font-family: var(--serif); font-size: 72px; line-height: 0.9; letter-spacing: -0.03em; font-style: italic; }
  .section-head .cat { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }
  .section-head h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(40px, 5.2vw, 72px); line-height: 1.0; letter-spacing: -0.025em;
    margin: 0; max-width: 22ch; text-wrap: balance;
  }
  .section-head h2 em { font-style: italic; }

  /* ————— HOW IT WORKS — paper-2, indigo numerals ————— */
  .how { background: var(--paper-2); border-top: 1px solid var(--rule); }
  .how .section-head .num { color: var(--indigo); }
  .how .section-head h2 em { color: var(--indigo); }

  .bigsteps { display: flex; flex-direction: column; }
  .bigstep {
    display: grid; grid-template-columns: 120px 1fr 1.2fr; gap: 48px;
    padding: 52px 0; border-top: 1px solid var(--rule); align-items: center;
  }
  .bigstep:last-child { border-bottom: 1px solid var(--rule); }
  @media (max-width: 960px) { .bigstep { grid-template-columns: 1fr; gap: 24px; } }
  .bigstep .bs-num {
    font-family: var(--serif); font-size: 108px; line-height: 0.9;
    letter-spacing: -0.04em; font-style: italic;
    transition: color .3s, transform .3s;
  }
  .bigstep:nth-child(1) .bs-num { color: var(--indigo); }
  .bigstep:nth-child(2) .bs-num { color: var(--amber-deep); }
  .bigstep:nth-child(3) .bs-num { color: var(--emerald); }
  .bigstep:hover .bs-num { transform: translateX(-6px); }
  .bigstep h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(28px, 3.4vw, 42px); line-height: 1.05; letter-spacing: -0.015em;
    margin: 0 0 12px;
  }
  .bigstep:nth-child(1) h3 em { font-style: italic; color: var(--indigo); }
  .bigstep:nth-child(2) h3 em { font-style: italic; color: var(--amber-deep); }
  .bigstep:nth-child(3) h3 em { font-style: italic; color: var(--emerald); }
  .bigstep p { font-size: 15.5px; color: var(--ink-2); margin: 0; line-height: 1.6; max-width: 36ch; }
  .bigstep .illo {
    background: var(--paper); border: 1px solid var(--rule); border-radius: 14px;
    padding: 20px; height: 180px; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .bigstep:nth-child(1) .illo { background: color-mix(in oklab, var(--indigo) 5%, var(--paper)); }
  .bigstep:nth-child(2) .illo { background: color-mix(in oklab, var(--amber) 8%, var(--paper)); }
  .bigstep:nth-child(3) .illo { background: color-mix(in oklab, var(--emerald) 6%, var(--paper)); }

  /* ————— AI DEMO — DARK section with indigo glow ————— */
  .demo-section {
    background: var(--ink); color: var(--paper);
    position: relative; overflow: hidden;
  }
  .demo-section::before {
    content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.7;
    background:
      radial-gradient(ellipse 700px 400px at 20% 10%, color-mix(in oklab, var(--indigo) 35%, transparent), transparent 65%),
      radial-gradient(ellipse 500px 350px at 90% 90%, color-mix(in oklab, var(--plum) 35%, transparent), transparent 65%);
  }
  .demo-section > .shell { position: relative; z-index: 1; }
  .demo-section .section-head h2 { color: var(--paper); }
  .demo-section .section-head h2 em { color: var(--amber); }
  .demo-section .section-head .num { color: var(--amber); }
  .demo-section .section-head .cat { color: color-mix(in oklab, var(--paper) 55%, transparent); }

  .demo { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid color-mix(in oklab, var(--paper) 15%, transparent); border-radius: 20px; overflow: hidden; background: color-mix(in oklab, var(--paper) 4%, transparent); backdrop-filter: blur(10px); }
  @media (max-width: 860px) { .demo { grid-template-columns: 1fr; } }
  .demo-side { padding: 32px; display: flex; flex-direction: column; }
  .demo-side + .demo-side { border-left: 1px solid color-mix(in oklab, var(--paper) 12%, transparent); }
  @media (max-width: 860px) { .demo-side + .demo-side { border-left: none; border-top: 1px solid color-mix(in oklab, var(--paper) 12%, transparent); } }
  .demo-side.out { background: color-mix(in oklab, var(--indigo) 15%, transparent); }
  .demo-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .demo-head .ttl { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; color: var(--paper); }
  .demo-head .dot { width: 8px; height: 8px; border-radius: 50%; background: color-mix(in oklab, var(--paper) 40%, transparent); }
  .demo-head .dot.on { background: var(--amber); box-shadow: 0 0 0 4px color-mix(in oklab, var(--amber) 25%, transparent); }
  .demo .body {
    flex: 1; color: color-mix(in oklab, var(--paper) 92%, transparent);
    font-family: var(--sans); font-size: 16.5px; line-height: 1.6; letter-spacing: -0.005em; font-weight: 400;
  }
  .demo .demo-side.out .body { font-size: 17.5px; line-height: 1.55; }
  .demo .out-text { white-space: pre-wrap; min-height: 180px; }
  .demo .out-text.typing::after { content: "▋"; color: var(--amber); animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-family: var(--mono); font-size: 10.5px; padding: 5px 10px;
    border: 1px solid color-mix(in oklab, var(--paper) 20%, transparent); border-radius: 999px;
    background: transparent; color: color-mix(in oklab, var(--paper) 70%, transparent); cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500;
    transition: all .15s;
  }
  .chip:hover:not(.active) { background: color-mix(in oklab, var(--paper) 8%, transparent); color: var(--paper); }
  .chip.active { background: var(--amber); color: var(--ink); border-color: var(--amber); }

  .demo-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid color-mix(in oklab, var(--paper) 12%, transparent); gap: 12px; }

  .demo-review-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; color: var(--paper); }
  .demo-review-head .mono { color: color-mix(in oklab, var(--paper) 55%, transparent); }

  .demo-section .btn-primary { background: var(--amber); color: var(--ink); }
  .demo-section .btn-primary:hover { background: var(--paper); }
  .demo-section .btn-ghost { color: var(--paper); border-color: color-mix(in oklab, var(--paper) 20%, transparent); }
  .demo-section .btn-ghost:hover { background: color-mix(in oklab, var(--paper) 10%, transparent); border-color: var(--paper); }

  /* ————— PULL QUOTE — rose/amber warm panel ————— */
  .pullquote {
    padding: calc(120px * var(--density)) 0;
    background: linear-gradient(135deg, color-mix(in oklab, var(--rose) 12%, var(--cream)), color-mix(in oklab, var(--amber) 12%, var(--cream)));
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    position: relative; overflow: hidden;
  }
  .pullquote::before {
    content: "\201C"; position: absolute; top: -40px; left: 40px;
    font-family: var(--serif); font-size: 360px; line-height: 1;
    color: color-mix(in oklab, var(--rose) 25%, transparent);
    font-style: italic; pointer-events: none;
  }
  .pullquote .shell { position: relative; z-index: 1; }
  .pullquote .q {
    font-family: var(--serif); font-size: clamp(36px, 5vw, 72px);
    line-height: 1.08; letter-spacing: -0.02em; color: var(--ink);
    max-width: 24ch; text-wrap: balance; margin: 0 0 48px;
  }
  .pullquote .q em { font-style: italic; color: var(--rose); }
  .pullquote .q mark { background: color-mix(in oklab, var(--amber) 55%, transparent); color: var(--ink); padding: 0 6px; border-radius: 4px; }
  .pullquote .attrib { display: flex; align-items: center; gap: 16px; }
  .pullquote .portrait {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--amber-deep));
    display: grid; place-items: center; color: white; font-weight: 700; font-size: 20px;
    font-family: var(--serif); font-style: italic;
    box-shadow: 0 8px 24px -6px color-mix(in oklab, var(--rose) 50%, transparent);
  }
  .pullquote .who b { display: block; font-size: 15px; font-weight: 600; }
  .pullquote .who span { display: block; font-size: 13px; color: var(--ink-2); margin-top: 2px; }

  /* ————— FEATURE GRID bento — mixed color cells ————— */
  .features { background: var(--paper); }
  .features .section-head .num { color: var(--amber-deep); }
  .features .section-head h2 em { color: var(--amber-deep); }

  .bento { display: grid; grid-template-columns: repeat(6, 1fr); grid-auto-rows: minmax(200px, auto); gap: 14px; }
  @media (max-width: 860px) { .bento { grid-template-columns: repeat(2, 1fr); } }
  .bento .cell {
    border: 1px solid var(--rule); border-radius: 16px;
    padding: 24px; display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    transition: transform .2s, border-color .2s;
    background: var(--paper);
  }
  .bento .cell:hover { transform: translateY(-3px); }

  /* Unique cell treatments */
  .bento .a {
    grid-column: span 4; grid-row: span 2;
    background: linear-gradient(135deg, color-mix(in oklab, var(--indigo) 8%, var(--paper)), var(--paper));
    border-color: color-mix(in oklab, var(--indigo) 25%, var(--rule));
  }
  .bento .b {
    grid-column: span 2; grid-row: span 1;
    background: color-mix(in oklab, var(--emerald) 10%, var(--paper));
    border-color: color-mix(in oklab, var(--emerald) 30%, var(--rule));
  }
  .bento .c {
    grid-column: span 2; grid-row: span 1;
    background: color-mix(in oklab, var(--amber) 14%, var(--paper));
    border-color: color-mix(in oklab, var(--amber) 35%, var(--rule));
  }
  .bento .d {
    grid-column: span 2; grid-row: span 1; background: var(--paper);
  }
  .bento .e {
    grid-column: span 2; grid-row: span 1;
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .bento .f {
    grid-column: span 2; grid-row: span 1;
    background: color-mix(in oklab, var(--rose) 10%, var(--paper));
    border-color: color-mix(in oklab, var(--rose) 30%, var(--rule));
  }
  @media (max-width: 860px) {
    .bento .a, .bento .b, .bento .c, .bento .d, .bento .e, .bento .f { grid-column: span 2; grid-row: span 1; }
  }
  .cell .tag { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .bento .a .tag { color: var(--indigo); }
  .bento .b .tag { color: var(--emerald); }
  .bento .c .tag { color: var(--amber-deep); }
  .bento .d .tag { color: var(--ink-3); }
  .bento .e .tag { color: color-mix(in oklab, var(--paper) 55%, transparent); }
  .bento .f .tag { color: var(--rose); }
  .cell h4 { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.1; letter-spacing: -0.01em; margin: 0 0 8px; color: inherit; }
  .cell.a h4 { font-size: 40px; }
  .cell.a h4 em { font-style: italic; color: var(--indigo); }
  .cell.b h4 em { font-style: italic; color: var(--emerald); }
  .cell.c h4 em { font-style: italic; color: var(--amber-deep); }
  .cell.d h4 em { font-style: italic; color: var(--ink); }
  .cell.e h4 em { font-style: italic; color: var(--amber); }
  .cell.f h4 em { font-style: italic; color: var(--rose); }
  .cell p { font-size: 14.5px; color: var(--ink-2); margin: 0; line-height: 1.55; max-width: 38ch; }
  .cell.e p { color: color-mix(in oklab, var(--paper) 78%, transparent); }
  .cell .viz { margin-top: auto; padding-top: 20px; }

  .spark { display: flex; align-items: flex-end; gap: 5px; height: 100px; }
  .spark span { flex: 1; background: color-mix(in oklab, var(--indigo) 20%, var(--rule-2)); border-radius: 4px; transition: all .4s; }
  .spark span.hi { background: var(--indigo); }
  .bento .a:hover .spark span.hi { background: var(--amber-deep); }

  .senti { display: flex; flex-direction: column; gap: 8px; }
  .senti-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .senti-row .bar { flex: 1; height: 8px; border-radius: 4px; background: color-mix(in oklab, var(--paper) 60%, transparent); overflow: hidden; position: relative; }
  .senti-row .bar span { position: absolute; inset: 0; border-radius: 4px; }
  .senti-row .bar.pos span { background: var(--emerald); width: 72%; }
  .senti-row .bar.neu span { background: var(--ink-3); width: 19%; }
  .senti-row .bar.neg span { background: var(--bad); width: 9%; }
  .senti-row .pct { font-family: var(--mono); font-size: 11px; color: var(--ink-2); width: 36px; text-align: right; font-weight: 600; }
  .senti-row .lbl { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2); width: 60px; }

  .langs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
  .lang { font-family: var(--mono); font-size: 10px; padding: 6px 4px; border: 1px solid color-mix(in oklab, var(--amber) 30%, var(--rule)); border-radius: 4px; text-align: center; color: var(--ink-2); letter-spacing: 0.04em; background: var(--paper); }
  .lang.on { background: var(--amber-deep); color: white; border-color: var(--amber-deep); }

  .mini-dash { background: var(--paper-2); border-radius: 10px; padding: 14px; border: 1px solid var(--rule); }
  .mini-dash .mdh { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-3); margin-bottom: 8px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
  .mini-dash .mdrow { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px dashed var(--rule); font-size: 12px; }
  .mini-dash .mdrow:first-of-type { border-top: none; }
  .mini-dash .mdrow .dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .mini-dash .mdrow .dot.g { background: var(--emerald); }
  .mini-dash .mdrow .dot.y { background: var(--amber); }
  .mini-dash .mdrow .dot.n { background: var(--ink-3); }
  .mini-dash .mdrow .name { flex: 1; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mini-dash .mdrow .st { color: var(--amber); font-size: 11px; }

  /* ————— PRICING — cream panel ————— */
  .pricing-section { background: var(--cream); border-top: 1px solid var(--rule); }
  .pricing-section .section-head .num { color: var(--emerald); }
  .pricing-section .section-head h2 em { color: var(--emerald); }

  .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--rule); border-radius: 20px; overflow: hidden; background: var(--paper); }
  @media (max-width: 860px) { .price-grid { grid-template-columns: 1fr; } }
  .plan { padding: 36px 32px; display: flex; flex-direction: column; border-right: 1px solid var(--rule); position: relative; }
  .plan:last-child { border-right: none; }
  @media (max-width: 860px) { .plan { border-right: none; border-bottom: 1px solid var(--rule); } .plan:last-child { border-bottom: none; } }

  .plan.featured { background: var(--ink); color: var(--paper); }
  .plan.featured .plan-sub, .plan.featured .plan-price small, .plan.featured li { color: color-mix(in oklab, var(--paper) 78%, transparent); }
  .plan.featured h3, .plan.featured .plan-price { color: var(--paper); }
  .plan.featured .plan-name { color: var(--amber); }
  .plan.featured li svg { color: var(--amber); }

  .plan .plan-name { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
  .plan:nth-child(1) .plan-name { color: var(--emerald); }
  .plan:nth-child(3) .plan-name { color: var(--indigo); }

  .plan h3 { font-family: var(--serif); font-weight: 400; font-size: 30px; letter-spacing: -0.02em; margin: 0 0 24px; }
  .plan .plan-price { font-family: var(--serif); font-size: 68px; line-height: 1; letter-spacing: -0.03em; color: var(--ink); }
  .plan .plan-price small { font-family: var(--sans); font-size: 14px; color: var(--ink-3); font-weight: 500; margin-left: 4px; letter-spacing: 0; }
  .plan .plan-sub { font-size: 14px; color: var(--ink-3); margin: 10px 0 24px; }
  .plan ul { list-style: none; padding: 0; margin: 0 0 24px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
  .plan li { font-size: 14px; color: var(--ink-2); display: flex; gap: 10px; align-items: flex-start; line-height: 1.4; }
  .plan li svg { flex: none; color: var(--emerald); margin-top: 3px; }
  .plan:nth-child(3) li svg { color: var(--indigo); }
  .plan .badge { position: absolute; top: 24px; right: 24px; background: var(--amber); color: var(--ink); font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 999px; letter-spacing: 0.08em; font-weight: 600; text-transform: uppercase; }

  /* ————— FAQ ————— */
  .faq-section { background: var(--paper); border-top: 1px solid var(--rule); }
  .faq-section .section-head .num { color: var(--plum); }
  .faq-section .section-head h2 em { color: var(--plum); }

  .faq details {
    border-bottom: 1px solid var(--rule); padding: 28px 0; cursor: pointer;
    transition: padding .2s;
  }
  .faq details[open] { padding: 32px 0; background: linear-gradient(90deg, color-mix(in oklab, var(--indigo) 3%, transparent), transparent 60%); border-radius: 8px; padding-left: 16px; padding-right: 16px; }
  .faq summary {
    list-style: none; display: grid; grid-template-columns: 1fr auto; gap: 32px;
    font-family: var(--serif); font-size: clamp(22px, 2.4vw, 30px); line-height: 1.2; letter-spacing: -0.015em;
    color: var(--ink); align-items: center;
  }
  .faq summary::-webkit-details-marker { display: none; }
  .faq .ico { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--rule-2); display: grid; place-items: center; color: var(--ink-2); transition: transform .3s, background .2s; flex: none; }
  .faq details[open] .ico { transform: rotate(45deg); background: var(--indigo); color: var(--paper); border-color: var(--indigo); }
  .faq details p { font-size: 16px; line-height: 1.65; color: var(--ink-2); margin: 16px 0 0; max-width: 65ch; }

  /* ————— BIG CTA — dark + amber ————— */
  .big-cta {
    padding: calc(140px * var(--density)) 0;
    text-align: center; background: var(--ink); color: var(--paper);
    position: relative; overflow: hidden;
  }
  .big-cta::before {
    content: ""; position: absolute; inset: 0; opacity: 0.6; pointer-events: none;
    background:
      radial-gradient(ellipse 700px 380px at 20% 30%, color-mix(in oklab, var(--indigo) 38%, transparent), transparent 65%),
      radial-gradient(ellipse 500px 320px at 85% 70%, color-mix(in oklab, var(--amber) 28%, transparent), transparent 65%),
      radial-gradient(ellipse 400px 200px at 50% 100%, color-mix(in oklab, var(--rose) 25%, transparent), transparent 70%);
  }
  .big-cta > * { position: relative; }
  .big-cta h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(48px, 8vw, 128px); line-height: 0.96; letter-spacing: -0.03em; margin: 0 0 24px; color: var(--paper); text-wrap: balance; max-width: 14ch; margin-left: auto; margin-right: auto; }
  .big-cta h2 em { font-style: italic; color: var(--amber); }
  .big-cta p { font-size: 19px; color: color-mix(in oklab, var(--paper) 78%, transparent); margin: 0 auto 36px; max-width: 50ch; line-height: 1.55; }
  .big-cta .btn-primary { background: var(--amber); color: var(--ink); }
  .big-cta .btn-primary:hover { background: var(--paper); }
  .big-cta .btn-ghost { color: var(--paper); border-color: color-mix(in oklab, var(--paper) 25%, transparent); }
  .big-cta .btn-ghost:hover { background: color-mix(in oklab, var(--paper) 10%, transparent); border-color: var(--paper); }

  /* ————— FOOTER ————— */
  footer { padding: 72px 0 40px; background: var(--cream); border-top: 1px solid var(--rule); }
  footer .foot-top { display: grid; grid-template-columns: 1.5fr 2.5fr; gap: 60px; margin-bottom: 56px; }
  @media (max-width: 720px) { footer .foot-top { grid-template-columns: 1fr; } }
  footer .tagline { font-family: var(--serif); font-size: 36px; line-height: 1.1; letter-spacing: -0.015em; color: var(--ink); margin-top: 18px; max-width: 14ch; }
  footer .tagline em { font-style: italic; color: var(--rose); }

  footer .cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  @media (max-width: 560px) { footer .cols { grid-template-columns: repeat(2, 1fr); } }
  footer h5 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 16px; font-weight: 500; }
  footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  footer a { color: var(--ink-2); text-decoration: none; font-size: 14.5px; transition: color .15s; }
  footer a:hover { color: var(--indigo); }

  footer .copy { padding-top: 28px; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; color: var(--ink-3); flex-wrap: wrap; gap: 12px; }
  footer .copy .status { display: inline-flex; align-items: center; gap: 6px; }
  footer .copy .status::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--emerald); box-shadow: 0 0 0 3px color-mix(in oklab, var(--emerald) 22%, transparent); }

  .reveal { opacity: 0; transform: translateY(20px); transition: opacity .8s ease, transform .8s cubic-bezier(.2,.8,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* ————— Gimmicks ————— */

  /* Star burst from buttons */
  .burst-star {
    position: fixed; pointer-events: none; z-index: 9998;
    color: var(--ochre); width: 18px; height: 18px;
    animation: burst 900ms cubic-bezier(.2,.8,.2,1) forwards;
    will-change: transform, opacity;
  }
  @keyframes burst {
    0%   { transform: translate(-50%, -50%) scale(0.2) rotate(0deg); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1) rotate(var(--rot)); opacity: 0; }
  }

  /* Keyboard-spawn drafting toast */
  .toast-dock {
    position: fixed; bottom: 24px; right: 24px; z-index: 9997;
    display: flex; flex-direction: column; gap: 12px;
    pointer-events: none;
  }
  .draft-toast {
    width: 340px; background: var(--paper);
    border: 1px solid var(--rule); border-radius: 14px;
    box-shadow: 0 20px 50px -20px color-mix(in oklab, var(--ink) 30%, transparent),
                0 1px 0 rgba(0,0,0,0.02);
    overflow: hidden; pointer-events: auto;
    animation: toast-in 400ms cubic-bezier(.2,.8,.2,1) both;
    position: relative;
  }
  .draft-toast.out { animation: toast-out 350ms cubic-bezier(.4,0,.8,.2) both; }
  @keyframes toast-in  { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes toast-out { to   { opacity: 0; transform: translateY(20px) scale(0.96); } }

  .draft-toast .dt-accent {
    position: absolute; inset: 0 auto 0 0; width: 4px;
    background: linear-gradient(180deg, var(--teal), var(--ochre));
  }
  .draft-toast .dt-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 10px 18px; border-bottom: 1px solid var(--rule); }
  .draft-toast .dt-head .ttl { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; color: var(--teal); }
  .draft-toast .dt-head .close { border: none; background: transparent; cursor: pointer; color: var(--ink-3); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 14px; }
  .draft-toast .dt-head .close:hover { background: var(--paper-2); color: var(--ink); }
  .draft-toast .dt-body { padding: 14px 18px; font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
  .draft-toast .dt-body .review { color: var(--ink-2); margin-bottom: 12px; }
  .draft-toast .dt-body .review b { color: var(--ink); font-weight: 600; }
  .draft-toast .dt-body .draft {
    padding: 10px 12px; border-radius: 8px;
    background: color-mix(in oklab, var(--teal) 6%, transparent);
    border: 1px dashed color-mix(in oklab, var(--teal) 40%, var(--rule));
    color: var(--ink); min-height: 36px;
    font-family: var(--sans);
  }
  .draft-toast .dt-body .draft.typing::after { content: "▋"; color: var(--teal); animation: blink 1s step-end infinite; margin-left: 2px; }
  .draft-toast .dt-label { font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teal); font-weight: 600; margin-bottom: 6px; display: inline-flex; align-items: center; gap: 6px; }
  .draft-toast .dt-label::before { content: "✦"; }

  /* Hint chip for keyboard shortcut */
  .kbd-hint {
    position: fixed; bottom: 24px; left: 24px; z-index: 9996;
    background: var(--ink); color: var(--paper);
    padding: 10px 14px; border-radius: 999px;
    font-size: 12.5px; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 10px 30px -10px color-mix(in oklab, var(--ink) 50%, transparent);
    animation: hint-in 600ms cubic-bezier(.2,.8,.2,1) 1200ms both;
    cursor: pointer; border: none;
    transition: transform .15s;
  }
  .kbd-hint:hover { transform: translateY(-2px); }
  .kbd-hint.dismissed { animation: hint-out 300ms forwards; }
  .kbd-hint kbd {
    background: color-mix(in oklab, var(--paper) 18%, transparent);
    border: 1px solid color-mix(in oklab, var(--paper) 25%, transparent);
    padding: 2px 7px; border-radius: 4px; font-family: var(--mono);
    font-size: 11px; color: var(--ochre); font-weight: 600;
  }
  @keyframes hint-in  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes hint-out { to   { opacity: 0; transform: translateY(12px); } }

  /* Ticker digit roll */
  .ticker { display: inline-flex; align-items: baseline; }
  .ticker .roll {
    display: inline-block; position: relative; min-width: 0.6ch; text-align: center;
    overflow: hidden; height: 1em; line-height: 1;
    vertical-align: baseline;
  }
  .ticker .roll span { display: block; transition: transform 500ms cubic-bezier(.2,.8,.2,1); }

  /* Cursor-trail stars in hero */
  .hero { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'><path d='M10 1l2.4 5.6 6.1.5-4.7 4 1.4 6-5.2-3.2-5.2 3.2 1.4-6L1.5 7.1l6.1-.5L10 1z' fill='%23c48a2c'/></svg>") 10 10, auto; }
  .trail-star {
    position: fixed; pointer-events: none; z-index: 60;
    color: var(--ochre); width: 14px; height: 14px;
    animation: trail 1200ms cubic-bezier(.2,.6,.3,1) forwards;
    will-change: transform, opacity;
  }
  @keyframes trail {
    0%   { transform: translate(-50%, -50%) scale(0.4) rotate(0deg); opacity: 0; }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(var(--rot)); }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% - 40px)) scale(0.2) rotate(var(--rot)); opacity: 0; }
  }

  /* 5-star approval stamp on card hover */
  .float-card .stamp {
    position: absolute; top: 18px; left: -14px;
    transform: rotate(-14deg) scale(0.6); opacity: 0;
    padding: 6px 12px;
    border: 2px solid var(--sage); color: var(--sage);
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.12em; border-radius: 4px;
    background: color-mix(in oklab, var(--sage-soft) 80%, var(--paper));
    pointer-events: none;
    transition: transform .4s cubic-bezier(.3,1.6,.6,1), opacity .3s;
    box-shadow: 0 2px 0 color-mix(in oklab, var(--sage) 25%, transparent);
  }
  .float-card:hover .stamp {
    opacity: 1; transform: rotate(-14deg) scale(1);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    .float-card.a, .float-card.b, .float-card.c { animation: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  function Star({ filled = true }) {
    return (
      <svg width="12" height="12" viewBox="0 0 16 16" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth={filled ? 0 : 1.2}>
        <path d="M8 1.5l2 4.4 4.8.4-3.7 3.2 1.1 4.7L8 11.8 3.8 14.2l1.1-4.7L1.2 6.3l4.8-.4L8 1.5z" />
      </svg>
    );
  }
  function Stars({ n = 5 }) { return <span className="stars">{Array.from({ length: 5 }).map((_, i) => <Star key={i} filled={i < n} />)}</span>; }
  function Check() { return <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8.5l3.5 3.5L13 4" /></svg>; }
  function Arrow() { return <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 7h8M8 4l3 3-3 3"/></svg>; }

  // Rolling-digit ticker — displays a number with each digit in a little overflow window
  function Ticker({ value }) {
    const digits = String(value).split("");
    return (
      <span className="ticker">
        {digits.map((d, i) => {
          if (!/\d/.test(d)) return <span key={i}>{d}</span>;
          const n = parseInt(d, 10);
          return (
            <span key={i} className="roll">
              <span style={{ transform: `translateY(-${n}em)` }}>
                {"0123456789".split("").map(x => <span key={x} style={{ display: "block" }}>{x}</span>)}
              </span>
            </span>
          );
        })}
      </span>
    );
  }

  // Star burst — spawn N stars that fly outward from (x,y) then fade
  function spawnBurst(x, y, count = 7) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement("div");
      el.className = "burst-star";
      el.style.left = x + "px"; el.style.top = y + "px";
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
      const dist = 60 + Math.random() * 50;
      el.style.setProperty("--dx", Math.cos(angle) * dist + "px");
      el.style.setProperty("--dy", Math.sin(angle) * dist + "px");
      el.style.setProperty("--rot", Math.floor(Math.random() * 720 - 360) + "deg");
      el.innerHTML = '<svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5l2 4.4 4.8.4-3.7 3.2 1.1 4.7L8 11.8 3.8 14.2l1.1-4.7L1.2 6.3l4.8-.4L8 1.5z"/></svg>';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }
  }

  function Logo() {
    return (
      <a className="brand" href="#">
        <div className="mark">r</div>
        <div className="wm">Review<em>Hub</em></div>
      </a>
    );
  }

  function Nav() {
    const linksRef = React.useRef(null);
    const pillRef = React.useRef(null);
    const [active, setActive] = React.useState("");
    const items = [
      { id: "how", label: "How it works" },
      { id: "demo", label: "AI drafts" },
      { id: "features", label: "Features" },
      { id: "pricing", label: "Pricing" },
      { id: "faq", label: "FAQ" }
    ];

    React.useEffect(() => {
      const ids = items.map(i => i.id);
      const onScroll = () => {
        let best = "";
        for (const id of ids) {
          const el = document.getElementById(id);
          if (!el) continue;
          const r = el.getBoundingClientRect();
          if (r.top < window.innerHeight * 0.4 && r.bottom > 80) { best = id; }
        }
        setActive(best);
      };
      onScroll();
      window.addEventListener("scroll", onScroll, { passive: true });
      return () => window.removeEventListener("scroll", onScroll);
    }, []);

    React.useEffect(() => {
      const pill = pillRef.current;
      const container = linksRef.current;
      if (!pill || !container) return;
      if (!active) { pill.classList.add("hidden"); return; }
      const link = container.querySelector(`a[data-id="${active}"]`);
      if (!link) { pill.classList.add("hidden"); return; }
      pill.classList.remove("hidden");
      pill.style.left = link.offsetLeft + "px";
      pill.style.width = link.offsetWidth + "px";
    }, [active]);

    const movePill = (target) => {
      const pill = pillRef.current;
      const container = linksRef.current;
      if (!pill || !container) return;
      pill.classList.remove("hidden");
      pill.style.left = target.offsetLeft + "px";
      pill.style.width = target.offsetWidth + "px";
    };

    const resetPill = () => {
      const pill = pillRef.current;
      const container = linksRef.current;
      if (!pill || !container) return;
      if (!active) { pill.classList.add("hidden"); return; }
      const link = container.querySelector(`a[data-id="${active}"]`);
      if (!link) return;
      pill.style.left = link.offsetLeft + "px";
      pill.style.width = link.offsetWidth + "px";
    };

    return (
      <nav className="top">
        <div className="shell bar">
          <Logo />
          <div className="nav-links" ref={linksRef} onMouseLeave={resetPill}>
            <span className="pill hidden" ref={pillRef} />
            {items.map(it => (
              <a key={it.id} href={`#${it.id}`} data-id={it.id}
                 className={active === it.id ? "active" : ""}
                 onMouseEnter={(e) => movePill(e.currentTarget)}>
                {it.label}
              </a>
            ))}
          </div>
          <div className="nav-cta">
            <span className="nav-ping"><span className="ping-dot" />LIVE</span>
            <a href="#" className="btn btn-ghost">Sign in</a>
            <a href="#cta" className="btn btn-amber">Install free <Arrow/></a>
          </div>
        </div>
      </nav>
    );
  }

  function Hero() {
    const [replyCount, setReplyCount] = React.useState(2847);
    const heroRef = React.useRef(null);
    const lastSpawn = React.useRef(0);

    React.useEffect(() => {
      const iv = setInterval(() => {
        setReplyCount(c => c + 1 + Math.floor(Math.random() * 2));
      }, 2400 + Math.random() * 1600);
      return () => clearInterval(iv);
    }, []);

    const onMove = (e) => {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const now = performance.now();
      if (now - lastSpawn.current < 80) return;
      lastSpawn.current = now;
      const el = document.createElement("div");
      el.className = "trail-star";
      el.style.left = e.clientX + "px";
      el.style.top = e.clientY + "px";
      el.style.setProperty("--dx", (Math.random() - 0.5) * 40 + "px");
      el.style.setProperty("--rot", Math.floor(Math.random() * 360 - 180) + "deg");
      el.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5l2 4.4 4.8.4-3.7 3.2 1.1 4.7L8 11.8 3.8 14.2l1.1-4.7L1.2 6.3l4.8-.4L8 1.5z"/></svg>';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    };

    return (
      <section className="hero" ref={heroRef} onMouseMove={onMove}>
        <div className="hero-bg" />
        <div className="hero-grid" />
        <div className="hero-vignette" />
        <div className="hero-amp" aria-hidden="true">&amp;</div>
        <div className="hero-coords" aria-hidden="true">
          <span className="cx">N 13°44′</span>
          <span className="cy">E 100°31′</span>
          <span className="cn">SUKHUMVIT · BKK</span>
        </div>
        <div className="shell hero-inner">
          <div className="hero-meta">
            <div className="eyebrow">
              <span className="dot" />
              <span className="mono">Live · <Ticker value={replyCount} /> replies sent today</span>
            </div>
            <div className="meta-right">
              <div className="avatars"><span>MP</span><span>PS</span><span>JR</span><span>+</span></div>
              <div className="ct"><b>1,240 shops</b> reply with us</div>
            </div>
          </div>
          <h1 className="display">
            Every review, answered in <span className="time">10 seconds.</span>
          </h1>
          <div className="hero-bottom">
            <div>
              <p className="lede">
                ReviewHub plugs into the six review sites your customers actually use — <b>Google, Yelp, Facebook, TripAdvisor, Trustpilot, Wongnai</b> — drafts the reply <mark>in your voice</mark>, and posts it the moment you hit send.
              </p>
              <div className="hero-cta">
                <a href="#cta" className="btn btn-amber btn-lg">Add to Chrome <Arrow/></a>
                <a href="#demo" className="btn btn-ghost btn-lg">See a live draft</a>
              </div>
              <div className="hero-proof">
                <div className="metric"><div className="n">4.9<small>/5</small></div><div className="l">Chrome Web Store</div></div>
                <div className="metric"><div className="n">12<small>s</small></div><div className="l">Median reply time</div></div>
                <div className="metric"><div className="n">94<small>%</small></div><div className="l">Drafts sent as-is</div></div>
              </div>
            </div>
            <CardStack />
          </div>
        </div>
      </section>
    );
  }

  function CardStack() {
    return (
      <div className="card-stack">
        <div className="float-card a">
          <div className="stamp">★★★★★ · Sent</div>
          <div className="sent">SENT · 8s</div>
          <div className="fc-head">
            <div className="fc-who">
              <div className="fc-avatar" style={{ background: "var(--rose)" }}>MP</div>
              <div className="fc-name">Marco P.</div>
              <Stars n={5} />
            </div>
            <div className="fc-plat">Google</div>
          </div>
          <div className="fc-body">"Barista remembered my order after one visit. Pour-over was down though."</div>
          <div className="fc-draft">
            <div className="fc-draft-label">AI draft · your voice</div>
            Appreciate you stopping by, Marco — pour-over's back Thursday. See you then.
          </div>
        </div>
        <div className="float-card b">
          <div className="stamp">★★★★★ · Replied</div>
          <div className="fc-head">
            <div className="fc-who">
              <div className="fc-avatar" style={{ background: "var(--emerald)" }}>PS</div>
              <div className="fc-name">Ploy S.</div>
              <Stars n={5} />
            </div>
            <div className="fc-plat">Wongnai</div>
          </div>
          <div className="fc-body">"ร้านน่ารักมาก บรรยากาศดี กาแฟอร่อย จะกลับมาอีกแน่นอน"</div>
          <div className="fc-draft">
            <div className="fc-draft-label">AI draft · Thai</div>
            ขอบคุณมากค่ะคุณพลอย รอพบคุณอีกครั้งค่ะ ☕
          </div>
        </div>
        <div className="float-card c">
          <div className="stamp" style={{ borderColor: "var(--ochre-deep)", color: "var(--ochre-deep)", background: "color-mix(in oklab, var(--ochre-soft) 80%, var(--paper))", boxShadow: "0 2px 0 color-mix(in oklab, var(--ochre-deep) 25%, transparent)" }}>★★★★ · Drafted</div>
          <div className="sent draft">DRAFTING</div>
          <div className="fc-head">
            <div className="fc-who">
              <div className="fc-avatar" style={{ background: "var(--plum)" }}>JR</div>
              <div className="fc-name">Jamie R.</div>
              <Stars n={4} />
            </div>
            <div className="fc-plat">Yelp</div>
          </div>
          <div className="fc-body">"Solid croissants, a bit slow on a Saturday. Would still come back."</div>
          <div className="fc-draft">
            <div className="fc-draft-label">AI draft · warm</div>
            Thanks Jamie — we've added a second oven for weekends. Try us again.
          </div>
        </div>
      </div>
    );
  }

  function Marquee() {
    const platforms = [
      { name: "Google",      color: "oklch(0.72 0.16 240)", rating: "4.9", reviews: "1.2M" },
      { name: "Yelp",        color: "oklch(0.65 0.22 25)",  rating: "4.8", reviews: "340K" },
      { name: "Facebook",    color: "oklch(0.62 0.15 255)", rating: "4.7", reviews: "890K" },
      { name: "TripAdvisor", color: "oklch(0.68 0.16 155)", rating: "4.9", reviews: "210K" },
      { name: "Trustpilot",  color: "oklch(0.68 0.16 155)", rating: "4.8", reviews: "450K" },
      { name: "Wongnai",     color: "oklch(0.72 0.18 35)",  rating: "4.9", reviews: "180K" }
    ];
    const row = (
      <span>
        {platforms.map((p, i) => (
          <React.Fragment key={i}>
            <span className="chunk" style={{ "--platcolor": p.color }}>
              <span className="star">★</span>
              <span className="plat">{p.name}</span>
              <span className="count">{p.rating}<span style={{ opacity: 0.5, margin: "0 6px" }}>·</span><b>{p.reviews}</b></span>
            </span>
            {i < platforms.length - 1 && <span className="sep">—</span>}
          </React.Fragment>
        ))}
        <span className="sep">—</span>
      </span>
    );
    return (
      <section className="marquee-section">
        <div className="marquee-row">{row}{row}{row}</div>
      </section>
    );
  }

  function HowItWorks() {
    const steps = [
      { n: "I", cat: "Connect", h: <>Paste a link,<br/>we pull the <em>reviews.</em></>, p: "Google OAuth takes 20 seconds. Other platforms accept a public URL or a CSV while their APIs warm up. You're online inside a minute.",
        illo: (
          <div style={{ width: "100%", display: "flex", gap: 8, alignItems: "center" }}>
            <div style={{ flex: 1, padding: "10px 12px", background: "var(--paper)", border: "1px solid var(--rule)", borderRadius: 8, fontFamily: "var(--mono)", fontSize: 11, color: "var(--ink-3)" }}>https://g.page/cafe-morning</div>
            <div style={{ padding: "10px 14px", background: "var(--indigo)", color: "var(--paper)", borderRadius: 8, fontSize: 12, fontWeight: 600 }}>Connect</div>
          </div>
        )
      },
      { n: "II", cat: "Draft", h: <>AI writes in <em>your voice —</em> not "delight."</>, p: "Trained on your last 20 replies. Drafts sound like you, in any of 10 languages — Thai, Japanese, and Korean done natively, not via translate.",
        illo: (
          <div style={{ width: "100%", fontFamily: "var(--sans)", fontSize: 15, color: "var(--ink)", lineHeight: 1.5, fontWeight: 500 }}>
            <div style={{ fontFamily: "var(--mono)", fontSize: 10, color: "var(--amber-deep)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10, fontWeight: 600 }}>✦ Draft</div>
            "Appreciate you stopping by, Marco — pour-over's back Thursday."
          </div>

  function GimmickLayer() {
    const [toasts, setToasts] = React.useState([]);
    const [hintShown, setHintShown] = React.useState(true);
    const hintDismissed = React.useRef(false);
    const nextId = React.useRef(1);

    const spawnToast = React.useCallback(async () => {
      const id = nextId.current++;
      const pick = DRAFT_SAMPLES[Math.floor(Math.random() * DRAFT_SAMPLES.length)];
      setToasts(ts => [...ts, { id, review: pick, draft: "", typing: true }]);
      try {
        const prompt = `You own a small local business. Reply to this review in one short sentence (under 20 words), warmly but specifically. Don't start with "Thank you". No emojis.\n\nREVIEW (${pick.stars}★ on ${pick.plat}, by ${pick.name}):\n"${pick.body}"\n\nREPLY:`;
        const text = await window.claude.complete(prompt);
        let i = 0;
        const iv = setInterval(() => {
          i += 2;
          setToasts(ts => ts.map(t => t.id === id ? { ...t, draft: text.slice(0, i) } : t));
          if (i >= text.length) {
            clearInterval(iv);
            setToasts(ts => ts.map(t => t.id === id ? { ...t, typing: false } : t));
            setTimeout(() => {
              setToasts(ts => ts.map(t => t.id === id ? { ...t, out: true } : t));
              setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 400);
            }, 5000);
          }
        }, 18);
      } catch (e) {
        setToasts(ts => ts.map(t => t.id === id ? { ...t, draft: "Appreciate you — see you next time.", typing: false } : t));
      }
    }, []);

    const dismissHint = () => {
      hintDismissed.current = true;
      setHintShown(false);
    };

    React.useEffect(() => {
      const onKey = (e) => {
        if (e.target.matches("input, textarea, [contenteditable]")) return;
        if (e.key === "r" || e.key === "R") {
          e.preventDefault();
          dismissHint();
          spawnToast();
        }
      };
      const onClick = (e) => {
        const btn = e.target.closest(".btn-amber, .btn-primary");
        if (!btn) return;
        if (btn.closest("#demo")) return; // don't double up over the demo
        const r = btn.getBoundingClientRect();
        spawnBurst(r.left + r.width / 2, r.top + r.height / 2, 8);
      };
      window.addEventListener("keydown", onKey);
      window.addEventListener("click", onClick);
      return () => { window.removeEventListener("keydown", onKey); window.removeEventListener("click", onClick); };
    }, [spawnToast]);

    const closeToast = (id) => {
      setToasts(ts => ts.map(t => t.id === id ? { ...t, out: true } : t));
      setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 400);
    };

    return (
      <React.Fragment>
        <div className="toast-dock">
          {toasts.map(t => (
            <div key={t.id} className={"draft-toast" + (t.out ? " out" : "")}>
              <div className="dt-accent" />
              <div className="dt-head">
                <div className="ttl">✦ Drafting · {t.review.plat}</div>
                <button className="close" onClick={() => closeToast(t.id)} aria-label="Close">×</button>
              </div>
              <div className="dt-body">
                <div className="review"><b>{t.review.name}</b> · {"★".repeat(t.review.stars)}<br/>"{t.review.body}"</div>
                <div className="dt-label">AI draft</div>
                <div className={"draft" + (t.typing ? " typing" : "")}>{t.draft}</div>
              </div>
            </div>
          ))}
        </div>
        {hintShown && (
          <button className="kbd-hint" onClick={() => { dismissHint(); spawnToast(); }} aria-label="Try drafting a review">
            Press <kbd>R</kbd> to draft a reply
          </button>
        )}
      </React.Fragment>
    );
  }

  function App() {
    const [t, setTweak] = useTweaks(LANDING_DEFAULTS);

    React.useEffect(() => {
      document.documentElement.dataset.theme = t.theme;
      document.documentElement.style.setProperty("--density",
        t.density === "tight" ? 0.82 : t.density === "spacious" ? 1.16 : 1);
    }, [t.theme, t.density]);

    React.useEffect(() => {
      const els = document.querySelectorAll(".reveal");
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
      }, { threshold: 0.1, rootMargin: "-50px" });
      els.forEach(el => io.observe(el));
      return () => io.disconnect();
    }, []);

    return (
