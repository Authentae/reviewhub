<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ReviewHub Dashboard — Three Directions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; background: #ece8dc; }
    body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #1d242c; }
    * { box-sizing: border-box; }
    button { font: inherit; }
    a { color: inherit; }
    /* Hide native scrollbar inside artboards while keeping scroll */
    .artboard-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .artboard-scroll::-webkit-scrollbar-thumb { background: #d8d2bf; border-radius: 3px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="dashboard-shared.jsx"></script>
  <script type="text/babel" src="dashboard-original.jsx"></script>
  <script type="text/babel" src="dashboard-sharpened.jsx"></script>
  <script type="text/babel" src="dashboard-A.jsx"></script>
  <script type="text/babel" src="dashboard-B.jsx"></script>
  <script type="text/babel" src="dashboard-C.jsx"></script>

  <script type="text/babel">
    // ─── Notes shared across the canvas ─────────────────────────────────
    function Note({ children, color = '#1e4d5e' }) {
      return (
        <div style={{
          fontFamily: 'Source Serif Pro, Georgia, serif',
          fontSize: 15, lineHeight: 1.5, color: '#1d242c',
          background: '#fbf8f1', padding: '20px 22px',
          border: '1px solid #e8e3d6', borderLeft: `3px solid ${color}`,
          borderRadius: 4, maxWidth: 760,
        }}>{children}</div>
      );
    }

    function Mono({ children, c = '#8b939c' }) {
      return <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: c, fontWeight: 600 }}>{children}</span>;
    }

    // Wrap arbitrary dashboard content so it scrolls inside the fixed artboard.
    function Frame({ children, w, h }) {
      return (
        <div className="artboard-scroll" style={{
          width: w, height: h, overflow: 'auto',
          background: '#fbf8f1',
        }}>{children}</div>
      );
    }

    // Helper to make a phone bezel inside an artboard.
    function Phone({ w = 390, h = 780, children }) {
      return (
        <div style={{
          width: w + 20, height: h + 20, padding: 10,
          background: '#1d242c', borderRadius: 38,
          boxShadow: '0 12px 30px rgba(29,36,44,0.18)',
        }}>
          <div className="artboard-scroll" style={{
            width: w, height: h, overflow: 'auto',
            background: '#fbf8f1', borderRadius: 28,
          }}>{children}</div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas
          title="ReviewHub Dashboard · Redesign Spectrum"
          subtitle="Three directions exploring density vs. calm, alongside a port of the original artifact. Drag to pan · ⌘/Ctrl-scroll to zoom · click any artboard to focus.">

          {/* ─── 0. CONTEXT ─────────────────────────────────────────── */}
          <DCSection id="context" title="01 · Context" subtitle="Where we are, what each direction trades.">
            <DCArtboard id="brief" label="The brief, in one frame" width={780} height={560}>
              <div style={{ padding: '36px 40px', fontFamily: 'Inter, sans-serif', color: '#1d242c', height: '100%', overflow: 'auto', background: '#fbf8f1' }}>
                <Mono>Brief · Internal note</Mono>
                <h1 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 38, fontWeight: 600, letterSpacing: '-0.02em', margin: '6px 0 18px' }}>
                  Three ways to make a calm inbox <i>useful</i>.
                </h1>
                <p style={{ fontSize: 14.5, lineHeight: 1.6, color: '#4a525a', margin: '0 0 14px', maxWidth: 640 }}>
                  The current dashboard is editorially handsome but spatially undecided — stats, chips, rating bars, and filters all stack before the first review. On a phone between shifts, the owner scrolls past three sections to find a guest waiting to be replied to.
                </p>
                <p style={{ fontSize: 14.5, lineHeight: 1.6, color: '#4a525a', margin: '0 0 22px', maxWidth: 640 }}>
                  Below are three directions across the density spectrum. None is "best" — each makes a different concrete trade. Pick the one whose <i>tradeoff</i> feels right; the visual language transfers.
                </p>

                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 18 }}>
                  <BriefCard tag="A" name="The Reading Room" tone="Split-pane">
                    Two columns, mail-app shape. List on the left, focused detail on the right. The single negative review the owner needs to reply to fills the canvas at load. Lowest density, highest focus.
                  </BriefCard>
                  <BriefCard tag="B" name="The Triage Rail" tone="Priority zone">
                    A dedicated rail at the top owns negatives — drop-cap rating, suggested angle, in-place draft button. Spatial separation, not color shouting. Medium density.
                  </BriefCard>
                  <BriefCard tag="C" name="The Magazine" tone="Editorial dense">
                    One column, every review typeset. Negatives get scale (huge serif rating), positives get a one-line brief. Stats live in the running header. Highest density, most editorial.
                  </BriefCard>
                </div>

                <div style={{ borderTop: '1px solid #e8e3d6', paddingTop: 14, fontSize: 12.5, color: '#8b939c', display: 'flex', gap: 24, flexWrap: 'wrap' }}>
                  <span><b style={{ color: '#1d242c' }}>Constraints honoured:</b> single file React + Tailwind-shaped, no libs, brand tokens preserved, mocked data still functional.</span>
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ─── 1b. ORIGINAL, SHARPENED ────────────────────────────── */}
          <DCSection id="sharpened" title="02 · Original, sharpened" subtitle="Same shape, same vocabulary — fixes the fold, the alert, severity, and adds proper states.">
            <DCArtboard id="sharp-rationale" label="What changed" width={420} height={900}>
              <div style={{ padding: 28, fontFamily: 'Inter, sans-serif', color: '#1d242c', height: '100%', overflow: 'auto', background: '#fbf8f1' }}>
                <Mono c="#1e4d5e">The brief in one frame</Mono>
                <h2 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 26, fontWeight: 600, margin: '6px 0 12px', letterSpacing: '-0.01em' }}>
                  Same dashboard, sharper edges.
                </h2>
                <p style={{ fontSize: 14, lineHeight: 1.6, color: '#4a525a', margin: '0 0 16px' }}>
                  You like the original because it's easy to read. So I left the layout, the typography, the brand vocabulary, and the card chrome alone — and just trimmed the four moments where the original was working <i>against</i> the eye.
                </p>
                <DiagItem n="01" head="Stat cards → 64px row">
                  4 stat cards (~92px tall each) compressed into a single row with the same numbers + sparklines. Saves ~80px of vertical space, recovers the fold.
                </DiagItem>
                <DiagItem n="02" head="Negative banner → typeset lede">
                  The pink banner with a ghost button is replaced with a card-shaped lede: rose eyebrow, serif headline, solid rose action. Same message, twice the gravity.
                </DiagItem>
                <DiagItem n="03" head="Severity is now in the rating glyph">
                  The avatar circle is replaced with a serif numeral rating. 1★ reads in rose, 5★ reads in dark grey — you sort by glyph color before reading any text.
                </DiagItem>
                <DiagItem n="04" head="SLA countdown is on the negative cards">
                  Mono "18h 42m to reply" or "Overdue · 4d ago" sits where the sentiment chip was. Tells you which one to do first.
                </DiagItem>
                <DiagItem n="05" head="Empty + error states designed">
                  Use the original's vocabulary — dashed border, mono eyebrow, serif headline.
                </DiagItem>
              </div>
            </DCArtboard>
            <DCArtboard id="sharp-desktop" label="Desktop · 1280" width={1280} height={900}>
              <Frame w={1280} h={900}><OriginalSharpened /></Frame>
            </DCArtboard>
            <DCArtboard id="sharp-mobile" label="Mobile · 390" width={430} height={900}>
              <Phone w={390} h={840}><OriginalSharpened mobile={true} /></Phone>
            </DCArtboard>
            <DCArtboard id="sharp-empty" label="Empty state" width={760} height={760}>
              <Frame w={760} h={760}><OriginalSharpened state="empty" /></Frame>
            </DCArtboard>
            <DCArtboard id="sharp-error" label="Error state" width={760} height={760}>
              <Frame w={760} h={760}><OriginalSharpened state="error" /></Frame>
            </DCArtboard>
          </DCSection>

          {/* ─── 1. ORIGINAL ────────────────────────────────────────── */}
          <DCSection id="original" title="03 · Starting point" subtitle="Faithful port of the attached artifact, kept for side-by-side comparison.">
            <DCArtboard id="og-desktop" label="Original — desktop · 1280" width={1280} height={900}>
              <Frame w={1280} h={900}><OriginalDashboard /></Frame>
            </DCArtboard>
            <DCArtboard id="og-notes" label="What I'd change" width={420} height={900}>
              <div style={{ padding: 28, fontFamily: 'Inter, sans-serif', color: '#1d242c', height: '100%', overflow: 'auto', background: '#fbf8f1' }}>
                <Mono>Diagnostic</Mono>
                <h2 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 24, fontWeight: 600, margin: '6px 0 14px', letterSpacing: '-0.01em' }}>
                  The fold is far too low.
                </h2>
                <DiagItem n="01" head="First review lands at ~y=820px">
                  Stats (4 cards) + chips + rating breakdown + search + filters add up to <b>~720px</b> before the first card. On 1280×800, the busy owner sees <i>zero</i> reviews.
                </DiagItem>
                <DiagItem n="02" head="Negative banner is decorative">
                  A pink-tinted rectangle sits between H1 and stats. Same visual weight as the toolbar. The "Show them" button is a ghost.
                </DiagItem>
                <DiagItem n="03" head="Cards don't telegraph severity">
                  4-pixel rose left-border on a flagged card vs. a 4-pixel amber border on a pinned card — same shape, different hue. Reading at a glance reduces to <i>colour decoding</i>.
                </DiagItem>
                <DiagItem n="04" head="Mobile: stat grid wraps poorly">
                  Below 640px the 4-up grid squashes to 2×2; chip row scrolls horizontally without indication; rating breakdown becomes thin and useless.
                </DiagItem>
                <DiagItem n="05" head="Empty state isn't designed">
                  Filtering to nothing produces a 13px gray sentence, no recovery path.
                </DiagItem>
              </div>
            </DCArtboard>
          </DCSection>

          {/* ─── 2. DIRECTION A ─────────────────────────────────────── */}
          <DCSection id="dir-a" title="03 · Direction A — The Reading Room" subtitle="Split-pane inbox. Calm, focused, one-thing-at-a-time.">
            <DCArtboard id="a-rationale" label="Rationale" width={380} height={840}>
              <div style={{ padding: 28, fontFamily: 'Inter, sans-serif', color: '#1d242c', height: '100%', overflow: 'auto', background: '#fbf8f1' }}>
                <Mono c="#1e4d5e">Direction A</Mono>
                <h2 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 28, fontWeight: 600, margin: '6px 0 12px', letterSpacing: '-0.01em' }}>
                  The Reading Room
                </h2>
                <p style={{ fontSize: 14, lineHeight: 1.6, color: '#4a525a', margin: '0 0 16px' }}>
                  A two-pane mail layout. The left column is a 380px scannable list ordered by SLA urgency; the right column is a single focused review with an editorial pull-quote and an inline AI-drafted reply. Stats compress to a 56px masthead ticker.
                </p>
                <h3 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 16, fontWeight: 600, margin: '14px 0 6px' }}>What it trades</h3>
                <ul style={{ fontSize: 13.5, lineHeight: 1.55, color: '#4a525a', paddingLeft: 18, margin: '0 0 14px' }}>
                  <li><b>Win:</b> first unreplied negative is the entire right pane on load — guaranteed above the fold at 1280×800.</li>
                  <li><b>Win:</b> reply happens in place; no modal, no scroll back to top.</li>
                  <li><b>Loss:</b> the rating-distribution chart goes away. Lives in /Analytics now.</li>
                  <li><b>Loss:</b> only one review visible at full fidelity at a time.</li>
                  <li><b>Mobile note:</b> right pane collapses; tapping a list row pushes a detail screen (iOS Mail pattern).</li>
                </ul>
                <h3 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 16, fontWeight: 600, margin: '14px 0 6px' }}>Negative-review treatment</h3>
                <p style={{ fontSize: 13.5, lineHeight: 1.55, color: '#4a525a', margin: 0 }}>
                  Negatives sort to the top, get a rose left-bar, an SLA countdown in mono, and the word <span style={{ color: '#c2566c', fontFamily: 'JetBrains Mono', fontWeight: 700, fontSize: 11, letterSpacing: '0.1em' }}>NEEDS REPLY</span> in the row. The negative is selected by default — so its full body, suggested angle, and Send button are what the eye lands on.
                </p>
              </div>
            </DCArtboard>
            <DCArtboard id="a-desktop" label="A · Desktop · 1440 × 840" width={1440} height={840}>
              <Frame w={1440} h={840}><DashboardA initialSelected={0} /></Frame>
            </DCArtboard>
            <DCArtboard id="a-mobile" label="A · Mobile · 390" width={430} height={840}>
              <Phone w={390} h={780}><DashboardA mobile={true} /></Phone>
            </DCArtboard>
          </DCSection>

          {/* ─── 3. DIRECTION B ─────────────────────────────────────── */}
          <DCSection id="dir-b" title="04 · Direction B — The Triage Rail" subtitle="A priority zone owns negatives. Spatial prominence, not red blocks.">
            <DCArtboard id="b-rationale" label="Rationale" width={380} height={1200}>
              <div style={{ padding: 28, fontFamily: 'Inter, sans-serif', color: '#1d242c', height: '100%', overflow: 'auto', background: '#fbf8f1' }}>
                <Mono c="#c2566c">Direction B</Mono>
                <h2 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 28, fontWeight: 600, margin: '6px 0 12px', letterSpacing: '-0.01em' }}>
                  The Triage Rail
                </h2>
                <p style={{ fontSize: 14, lineHeight: 1.6, color: '#4a525a', margin: '0 0 16px' }}>
                  Single-column lede: <i>"Three guests need a reply"</i>. A bordered Priority section sits above the regular feed, separated by a 1px black underline. Each negative is full-bleed: drop-cap rating, body in 14.5px, a dashed "Suggested angle" block, three actions in line.
                </p>
                <h3 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 16, fontWeight: 600, margin: '14px 0 6px' }}>What it trades</h3>
                <ul style={{ fontSize: 13.5, lineHeight: 1.55, color: '#4a525a', paddingLeft: 18, margin: '0 0 14px' }}>
                  <li><b>Win:</b> negatives are unignorable because they own a third of the viewport — but the page never raises its voice.</li>
                  <li><b>Win:</b> stat strip shrinks 4 cards into a single 90px row with sparklines, freeing vertical space.</li>
                  <li><b>Win:</b> mobile degrades cleanly — same layout, just narrower; the Priority rail still leads.</li>
                  <li><b>Loss:</b> compared to A, you only see one review's full body at a time before scrolling.</li>
                  <li><b>Loss:</b> no split detail; replying still uses an overlay/page push (out of scope here).</li>
                </ul>
                <h3 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 16, fontWeight: 600, margin: '14px 0 6px' }}>Negative-review treatment</h3>
                <p style={{ fontSize: 13.5, lineHeight: 1.55, color: '#4a525a', margin: '0 0 14px' }}>
                  No banner. Instead, a section with its own headline and a section divider above + below. The rating glyph is large, set in serif, rose-coloured. SLA countdowns in mono on the right of each row turn red when overdue. The action button is the one solid teal element on the page.
                </p>
                <h3 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 16, fontWeight: 600, margin: '14px 0 6px' }}>Card hierarchy</h3>
                <p style={{ fontSize: 13.5, lineHeight: 1.55, color: '#4a525a', margin: 0 }}>
                  Negatives: tall row, large rating, full body, suggested angle, action buttons.<br/>
                  5★ replied: short row, condensed rating, 2-line clamp, no actions.<br/>
                  Same component, different density — the eye sorts itself.
                </p>
              </div>
            </DCArtboard>
            <DCArtboard id="b-desktop" label="B · Desktop · 1280 × 1100" width={1280} height={1100}>
              <Frame w={1280} h={1100}><DashboardB /></Frame>
            </DCArtboard>
            <DCArtboard id="b-mobile" label="B · Mobile · 390" width={430} height={1100}>
              <Phone w={390} h={1040}><DashboardB mobile={true} /></Phone>
            </DCArtboard>
          </DCSection>

          {/* ─── 4. DIRECTION C ─────────────────────────────────────── */}
          <DCSection id="dir-c" title="05 · Direction C — The Magazine" subtitle="Editorial dense. Type does the hierarchy.">
            <DCArtboard id="c-rationale" label="Rationale" width={380} height={1200}>
              <div style={{ padding: 28, fontFamily: 'Inter, sans-serif', color: '#1d242c', height: '100%', overflow: 'auto', background: '#fbf8f1' }}>
                <Mono c="#1d242c">Direction C</Mono>
                <h2 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 28, fontWeight: 600, margin: '6px 0 12px', letterSpacing: '-0.01em' }}>
                  The Magazine
                </h2>
                <p style={{ fontSize: 14, lineHeight: 1.6, color: '#4a525a', margin: '0 0 16px' }}>
                  Treat the inbox like a daily issue. A masthead with the date and a running stat line. A <i>lead story</i> — your worst unreplied review, rendered with a 110-pt serif rating glyph and the body as a serif headline. Two secondary negatives below. Then "From the postbag" — every other review reduced to a one-line typeset entry with a tiny serif numeral.
                </p>
                <h3 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 16, fontWeight: 600, margin: '14px 0 6px' }}>What it trades</h3>
                <ul style={{ fontSize: 13.5, lineHeight: 1.55, color: '#4a525a', paddingLeft: 18, margin: '0 0 14px' }}>
                  <li><b>Win:</b> highest density of the three — the whole inbox fits on one screen, sorted by importance.</li>
                  <li><b>Win:</b> hierarchy is purely type + scale; almost no chrome.</li>
                  <li><b>Win:</b> brand voice (New Yorker meets Linear) is loudest here — feels different from any SaaS dashboard.</li>
                  <li><b>Loss:</b> brief rows clamp to one line — owners who scan-read may want more body for 3-star greys.</li>
                  <li><b>Loss:</b> reply flow needs an overlay (the row is too tight to inline-compose).</li>
                  <li><b>Loss:</b> on mobile, the lead story still works but the brief grid drops to 2 columns.</li>
                </ul>
                <h3 style={{ fontFamily: 'Source Serif Pro, Georgia, serif', fontSize: 16, fontWeight: 600, margin: '14px 0 6px' }}>Negative-review treatment</h3>
                <p style={{ fontSize: 13.5, lineHeight: 1.55, color: '#4a525a', margin: 0 }}>
                  Pure scale. The 1-star is set 110pt in rose, the 5-star is set 18pt in dark grey. A reader's eye lands on the rose numeral before any text is read.
                </p>
              </div>
            </DCArtboard>
            <DCArtboard id="c-desktop" label="C · Desktop · 1280 × 980" width={1280} height={980}>
              <Frame w={1280} h={980}><DashboardC /></Frame>
            </DCArtboard>
            <DCArtboard id="c-mobile" label="C · Mobile · 390" width={430} height={980}>
              <Phone w={390} h={920}><DashboardC mobile={true} /></Phone>
            </DCArtboard>
          </DCSection>

          {/* ─── 5. STATES ──────────────────────────────────────────── */}
          <DCSection id="states" title="06 · Empty / loading / error" subtitle="States designed as part of the product, shown on Direction C — they port to A and B with the same vocabulary.">
            <DCArtboard id="state-empty" label="Empty · No matches" width={900} height={680}>
              <Frame w={900} h={680}><DashboardC state="empty" /></Frame>
            </DCArtboard>
            <DCArtboard id="state-loading" label="Loading · Initial fetch" width={900} height={680}>
              <Frame w={900} h={680}><DashboardC state="loading" /></Frame>
            </DCArtboard>
            <DCArtboard id="state-error" label="Error · Platform disconnected" width={900} height={680}>
              <Frame w={900} h={680}><DashboardC state="error" /></Frame>
            </DCArtboard>
          </DCSection>

        </DesignCanvas>
      );
    }

    function BriefCard({ tag, name, tone, children }) {
      return (
        <div style={{ background: '#ffffff', border: '1px solid #e8e3d6', borderRadius: 6, padding: '16px 18px' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 6 }}>
            <span style={{ fontFamily: 'Source Serif Pro', fontSize: 28, fontWeight: 700, color: '#1e4d5e', lineHeight: 1 }}>{tag}</span>
            <span style={{ fontFamily: 'JetBrains Mono', fontSize: 9, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#8b939c', fontWeight: 600 }}>{tone}</span>
          </div>
          <h4 style={{ fontFamily: 'Source Serif Pro', fontSize: 18, fontWeight: 600, margin: '0 0 6px', letterSpacing: '-0.01em' }}>{name}</h4>
          <p style={{ fontSize: 12.5, lineHeight: 1.5, color: '#4a525a', margin: 0 }}>{children}</p>
        </div>
      );
    }

    function DiagItem({ n, head, children }) {
      return (
        <div style={{ display: 'flex', gap: 12, padding: '12px 0', borderTop: '1px solid #e8e3d6' }}>
          <span style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: '#8b939c', fontWeight: 600, flexShrink: 0, paddingTop: 2 }}>{n}</span>
          <div>
            <div style={{ fontFamily: 'Source Serif Pro', fontSize: 15, fontWeight: 600, color: '#1d242c', marginBottom: 3 }}>{head}</div>
            <p style={{ fontSize: 13, lineHeight: 1.5, color: '#4a525a', margin: 0 }}>{children}</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
