<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ReviewHub — The reply layer for local business</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: oklch(0.985 0.005 85);
    --paper-2: oklch(0.97 0.008 82);
    --ink: oklch(0.18 0.015 260);
    --ink-2: oklch(0.32 0.02 260);
    --ink-3: oklch(0.55 0.02 260);
    --rule: oklch(0.88 0.01 260);
    --rule-2: oklch(0.82 0.01 260);
    --accent: oklch(0.52 0.19 264);      /* indigo */
    --accent-soft: oklch(0.92 0.05 264);
    --warm: oklch(0.72 0.14 65);          /* amber */
    --ok: oklch(0.62 0.14 155);
    --star: oklch(0.75 0.16 75);

    --density: 1;
    --gutter: calc(24px * var(--density));
    --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
    --sans: "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  [data-theme="dark"] {
    --paper: oklch(0.16 0.012 260);
    --paper-2: oklch(0.21 0.015 260);
    --ink: oklch(0.97 0.008 85);
    --ink-2: oklch(0.85 0.012 260);
    --ink-3: oklch(0.65 0.02 260);
    --rule: oklch(0.30 0.02 260);
    --rule-2: oklch(0.38 0.02 260);
    --accent: oklch(0.72 0.17 264);
    --accent-soft: oklch(0.28 0.08 264);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ——— Structural rails ——— */
  .shell { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
  @media (max-width: 720px) { .shell { padding: 0 20px; } }

  .mono { font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
  .serif { font-family: var(--serif); font-weight: 400; font-style: normal; letter-spacing: -0.01em; }
  .italic { font-style: italic; }

  .rule { border: 0; border-top: 1px solid var(--rule); margin: 0; }

  /* ——— Nav ——— */
  nav.top {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in oklab, var(--paper) 90%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--rule);
  }
  nav.top .bar {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
  .brand .mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-family: var(--serif); font-size: 18px; font-style: italic;
    line-height: 1;
  }
  .brand .wm { font-family: var(--serif); font-size: 22px; letter-spacing: -0.01em; }
  .brand .wm em { font-style: italic; color: var(--ink-2); }

  .nav-links { display: flex; align-items: center; gap: 28px; }
  .nav-links a { text-decoration: none; color: var(--ink-2); font-size: 14px; font-weight: 500; }
  .nav-links a:hover { color: var(--ink); }
  .nav-cta { display: flex; align-items: center; gap: 10px; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px; border-radius: 999px; font-size: 14px; font-weight: 600;
    font-family: var(--sans); cursor: pointer; text-decoration: none;
    border: 1px solid transparent; transition: all .15s ease;
    white-space: nowrap;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: color-mix(in oklab, var(--ink) 85%, var(--accent)); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--rule-2); }
  .btn-ghost:hover { background: var(--paper-2); }
  .btn-lg { padding: 13px 22px; font-size: 15px; }

  @media (max-width: 860px) {
    .nav-links { display: none; }
  }

  /* ——— Hero ——— */
  .hero { position: relative; padding: calc(72px * var(--density)) 0 calc(40px * var(--density)); }
  .hero-grid { display: grid; grid-template-columns: 1.08fr 1fr; gap: 56px; align-items: end; }
  @media (max-width: 1024px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }

  .eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 5px 11px 5px 7px; border: 1px solid var(--rule-2); border-radius: 999px; background: var(--paper); }
  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ok) 18%, transparent); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }

  h1.display {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(48px, 7.2vw, 108px);
    line-height: 0.98; letter-spacing: -0.025em;
    margin: 22px 0 24px; color: var(--ink);
    text-wrap: balance;
  }
  h1.display em { font-style: italic; color: var(--accent); }
  h1.display .amp { font-style: italic; color: var(--warm); }
  h1.display .stk { position: relative; white-space: nowrap; }
  h1.display .stk::after {
    content: ""; position: absolute; left: -2%; right: -2%; top: 50%;
    height: 0.07em; background: var(--ink-3); transform: translateY(-10%);
    border-radius: 2px;
  }

  .lede {
    font-size: 19px; line-height: 1.55; color: var(--ink-2); max-width: 52ch;
    margin: 0 0 32px;
  }

  .hero-cta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .trust { display: flex; gap: 24px; margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--rule); }
  .trust .metric .n { font-family: var(--serif); font-size: 34px; line-height: 1; color: var(--ink); }
  .trust .metric .l { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; }

  /* ——— Live feed card (hero right) ——— */
  .feed-frame {
    position: relative;
    background: var(--paper-2);
    border: 1px solid var(--rule-2);
    border-radius: 20px;
    padding: 14px;
    box-shadow: 0 1px 0 color-mix(in oklab, var(--ink) 5%, transparent),
                0 30px 60px -30px color-mix(in oklab, var(--ink) 22%, transparent);
  }
  .feed-frame::before {
    content: ""; position: absolute; inset: -1px; border-radius: 21px;
    background: linear-gradient(180deg, color-mix(in oklab, var(--accent) 14%, transparent), transparent 40%);
    z-index: -1;
  }
  .feed-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px 10px;
  }
  .feed-head .title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--ink); }
  .feed-head .title .live { background: var(--ok); color: white; font-family: var(--mono); font-size: 9.5px; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.08em; }

  .feed { display: flex; flex-direction: column; gap: 8px; max-height: 520px; overflow: hidden; position: relative; }
  .feed::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 80px;
    background: linear-gradient(180deg, transparent, var(--paper-2));
    pointer-events: none;
  }

  .review {
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 12px; padding: 14px 16px;
    transition: all .4s ease;
  }
  .review.new { animation: slideIn .5s ease; border-color: color-mix(in oklab, var(--accent) 50%, var(--rule)); }
  @keyframes slideIn { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .review .r-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 10px; }
  .review .who { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .review .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); display: grid; place-items: center; font-size: 11px; font-weight: 700; flex: none; }
  .review .name { font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .review .plat { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border: 1px solid var(--rule); border-radius: 4px; flex: none; }
  .stars { display: inline-flex; gap: 1px; color: var(--star); }
  .stars.dim { color: var(--rule-2); }
  .review .body { font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
  .reply-draft {
    margin-top: 10px; padding: 10px 12px; border-radius: 8px;
    background: color-mix(in oklab, var(--accent) 6%, var(--paper));
    border: 1px dashed color-mix(in oklab, var(--accent) 35%, var(--rule));
    font-size: 12.5px; color: var(--ink-2); line-height: 1.5;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .reply-draft .label {
    font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--accent); font-weight: 600; padding: 2px 5px; background: var(--paper);
    border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--rule)); border-radius: 3px; flex: none;
  }

  /* ——— Marquee platforms ——— */
  .platforms {
    padding: calc(48px * var(--density)) 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    background: var(--paper-2);
  }
  .platforms .label { text-align: center; margin-bottom: 24px; }
  .plat-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; }
  .plat-row > div {
    padding: 14px 10px; text-align: center; font-family: var(--serif);
    font-size: 26px; color: var(--ink-2); letter-spacing: -0.01em;
    border-right: 1px solid var(--rule);
  }
  .plat-row > div:last-child { border-right: none; }
  .plat-row > div small { display: block; font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; font-style: normal; }
  @media (max-width: 720px) {
    .plat-row { grid-template-columns: repeat(3, 1fr); }
    .plat-row > div:nth-child(3) { border-right: none; }
    .plat-row > div:nth-child(-n+3) { border-bottom: 1px solid var(--rule); }
  }

  /* ——— Sections ——— */
  .section { padding: calc(96px * var(--density)) 0; position: relative; }
  .section + .section { border-top: 1px solid var(--rule); }
  .section-head { display: grid; grid-template-columns: 180px 1fr; gap: 40px; margin-bottom: 56px; align-items: end; }
  @media (max-width: 720px) { .section-head { grid-template-columns: 1fr; gap: 14px; } }
  .section-head h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(36px, 4.4vw, 58px); line-height: 1.0; letter-spacing: -0.02em;
    margin: 0; max-width: 22ch; text-wrap: balance;
  }
  .section-head h2 em { font-style: italic; color: var(--accent); }

  /* ——— How it works: three steps ——— */
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--rule); border-radius: 16px; overflow: hidden; background: var(--paper); }
  @media (max-width: 860px) { .steps { grid-template-columns: 1fr; } }
  .step { padding: 32px; border-right: 1px solid var(--rule); position: relative; }
  .step:last-child { border-right: none; }
  @media (max-width: 860px) { .step { border-right: none; border-bottom: 1px solid var(--rule); } .step:last-child { border-bottom: none; } }
  .step .num { font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.1em; margin-bottom: 16px; }
  .step h3 { font-family: var(--serif); font-weight: 400; font-size: 30px; line-height: 1.1; letter-spacing: -0.01em; margin: 0 0 10px; }
  .step p { font-size: 14.5px; color: var(--ink-2); line-height: 1.55; margin: 0 0 20px; }
  .step .sketch { height: 140px; border-radius: 10px; border: 1px solid var(--rule); background: var(--paper-2); display: grid; place-items: center; overflow: hidden; position: relative; }

  /* ——— AI demo ——— */
  .demo { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: stretch; }
  @media (max-width: 860px) { .demo { grid-template-columns: 1fr; } }
  .demo-card {
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 16px; padding: 28px; display: flex; flex-direction: column;
  }
  .demo-card .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .demo-card .head .title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .demo-card textarea, .demo-card .out {
    font-family: var(--sans); font-size: 15px; line-height: 1.55;
    color: var(--ink); background: transparent;
    border: none; outline: none; resize: none; width: 100%;
    flex: 1; min-height: 180px;
  }
  .demo-card .out { white-space: pre-wrap; min-height: 180px; }
  .demo-card .out.typing::after { content: "▋"; color: var(--accent); animation: blink 1s step-end infinite; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }
  .demo-card .foot { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--rule); gap: 12px; }
  .demo-card .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-family: var(--mono); font-size: 11px; padding: 4px 9px;
    border: 1px solid var(--rule-2); border-radius: 999px;
    background: var(--paper); color: var(--ink-2); cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip:hover:not(.active) { background: var(--paper-2); }
  .demo-out-card { background: color-mix(in oklab, var(--accent) 4%, var(--paper)); border-color: color-mix(in oklab, var(--accent) 28%, var(--rule)); }
  .demo-out-card .head .title { color: var(--accent); }

  /* ——— Features grid ——— */
  .feat-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); border-radius: 16px; overflow: hidden; }
  .feat { background: var(--paper); padding: 28px; }
  .feat.x6 { grid-column: span 6; }
  .feat.x4 { grid-column: span 4; }
  .feat.x8 { grid-column: span 8; }
  .feat.x12 { grid-column: span 12; }
  @media (max-width: 860px) { .feat.x6, .feat.x4, .feat.x8 { grid-column: span 12; } }
  .feat .tag { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
  .feat h4 { font-family: var(--serif); font-size: 28px; font-weight: 400; line-height: 1.12; letter-spacing: -0.01em; margin: 0 0 8px; }
  .feat h4 em { font-style: italic; color: var(--accent); }
  .feat p { font-size: 14.5px; color: var(--ink-2); margin: 0 0 18px; line-height: 1.55; }
  .feat .viz { margin-top: auto; }

  /* mini viz */
  .spark { display: flex; align-items: flex-end; gap: 4px; height: 56px; }
  .spark span { flex: 1; background: var(--ink); border-radius: 3px; opacity: 0.85; }
  .spark span.hi { background: var(--accent); opacity: 1; }

  .senti { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .senti .bar { padding: 10px 12px; border-radius: 8px; background: var(--paper-2); border: 1px solid var(--rule); }
  .senti .bar .n { font-family: var(--serif); font-size: 28px; line-height: 1; }
  .senti .bar .l { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-3); margin-top: 4px; letter-spacing: 0.06em; }
  .senti .bar.pos .n { color: var(--ok); }
  .senti .bar.neu .n { color: var(--ink-3); }
  .senti .bar.neg .n { color: oklch(0.58 0.16 28); }

  /* thai callout */
  .i18n-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .lang {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 10px; border: 1px solid var(--rule-2); border-radius: 999px;
    color: var(--ink-2); letter-spacing: 0.04em;
  }
  .lang.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ——— Pricing ——— */
  .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 860px) { .price-grid { grid-template-columns: 1fr; } }
  .plan {
    background: var(--paper); border: 1px solid var(--rule);
    border-radius: 16px; padding: 28px; position: relative;
    display: flex; flex-direction: column;
  }
  .plan.featured { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .plan.featured .plan-name, .plan.featured .plan-price, .plan.featured li { color: var(--paper); }
  .plan.featured .plan-sub, .plan.featured .plan-price small { color: color-mix(in oklab, var(--paper) 70%, transparent); }
  .plan .plan-name { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
  .plan .plan-price { font-family: var(--serif); font-size: 54px; line-height: 1; letter-spacing: -0.02em; }
  .plan .plan-price small { font-family: var(--sans); font-size: 14px; color: var(--ink-3); font-weight: 500; margin-left: 2px; }
  .plan .plan-sub { font-size: 14px; color: var(--ink-3); margin: 8px 0 22px; }
  .plan ul { list-style: none; padding: 0; margin: 0 0 22px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .plan li { font-size: 14px; color: var(--ink-2); display: flex; gap: 10px; align-items: flex-start; }
  .plan li::before { content: ""; width: 14px; height: 14px; border-radius: 50%; background: color-mix(in oklab, var(--accent) 22%, transparent); flex: none; margin-top: 3px; position: relative; }
  .plan li::after { content: ""; position: absolute; }
  .plan.featured li::before { background: color-mix(in oklab, var(--paper) 30%, transparent); }
  .plan .badge { position: absolute; top: -10px; right: 20px; background: var(--warm); color: var(--ink); font-family: var(--mono); font-size: 10px; padding: 4px 9px; border-radius: 999px; letter-spacing: 0.08em; font-weight: 600; text-transform: uppercase; }

  /* ——— FAQ ——— */
  .faq { border-top: 1px solid var(--rule); }
  .faq details {
    border-bottom: 1px solid var(--rule);
    padding: 22px 0; cursor: pointer;
  }
  .faq summary {
    list-style: none; display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
    font-family: var(--serif); font-size: 24px; line-height: 1.25; letter-spacing: -0.01em;
    color: var(--ink);
  }
  .faq summary::-webkit-details-marker { display: none; }
  .faq summary::after {
    content: "+"; font-family: var(--mono); font-size: 22px; color: var(--ink-3);
    transition: transform .2s;
  }
  .faq details[open] summary::after { content: "−"; }
  .faq details p { font-size: 15px; line-height: 1.6; color: var(--ink-2); margin: 14px 0 0; max-width: 65ch; }

  /* ——— CTA ——— */
  .big-cta { padding: calc(120px * var(--density)) 0; text-align: center; background: var(--ink); color: var(--paper); position: relative; overflow: hidden; }
  .big-cta h2 { font-family: var(--serif); font-weight: 400; font-size: clamp(40px, 6vw, 86px); line-height: 1.0; letter-spacing: -0.02em; margin: 0 0 22px; color: var(--paper); text-wrap: balance; }
  .big-cta h2 em { font-style: italic; color: color-mix(in oklab, var(--accent) 75%, var(--paper)); }
  .big-cta p { font-size: 18px; color: color-mix(in oklab, var(--paper) 75%, transparent); margin: 0 auto 32px; max-width: 56ch; }
  .big-cta .btn-primary { background: var(--paper); color: var(--ink); }
  .big-cta .btn-primary:hover { background: var(--warm); color: var(--ink); }
  .big-cta .btn-ghost { color: var(--paper); border-color: color-mix(in oklab, var(--paper) 25%, transparent); }
  .big-cta .btn-ghost:hover { background: color-mix(in oklab, var(--paper) 10%, transparent); }

  /* ——— Footer ——— */
  footer { padding: 56px 0 40px; border-top: 1px solid var(--rule); background: var(--paper); }
  footer .foot-grid { display: grid; grid-template-columns: 2fr repeat(3, 1fr); gap: 40px; }
  @media (max-width: 720px) { footer .foot-grid { grid-template-columns: 1fr 1fr; } }
  footer h5 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 14px; font-weight: 500; }
  footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  footer a { color: var(--ink-2); text-decoration: none; font-size: 14px; }
  footer a:hover { color: var(--ink); }
  footer .copy { margin-top: 48px; padding-top: 22px; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; color: var(--ink-3); }
  footer .note { font-family: var(--serif); font-size: 16px; color: var(--ink-2); margin-top: 10px; max-width: 40ch; }

  /* star SVG sizing */
  .star-svg { width: 12px; height: 12px; }

  /* reveal on scroll */
  .reveal { opacity: 0; transform: translateY(14px); transition: opacity .7s ease, transform .7s ease; }
  .reveal.in { opacity: 1; transform: translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="landing-sections.jsx"></script>
<script type="text/babel" src="landing-feed.jsx"></script>
<script type="text/babel" src="landing-demo.jsx"></script>

<script type="text/babel">
  const LANDING_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "indigo",
    "theme": "light",
    "density": "comfortable",
    "heroVariant": "live-feed",
    "copyTone": "punchy"
  }/*EDITMODE-END*/;

  const ACCENT_MAP = {
    indigo:  { light: "oklch(0.52 0.19 264)", dark: "oklch(0.72 0.17 264)", soft: "oklch(0.92 0.05 264)", softDark: "oklch(0.28 0.08 264)" },
    emerald: { light: "oklch(0.52 0.15 158)", dark: "oklch(0.72 0.14 158)", soft: "oklch(0.93 0.04 158)", softDark: "oklch(0.26 0.06 158)" },
    amber:   { light: "oklch(0.56 0.16 55)",  dark: "oklch(0.74 0.14 65)",  soft: "oklch(0.94 0.04 70)",  softDark: "oklch(0.28 0.07 60)" },
    rose:    { light: "oklch(0.56 0.19 10)",  dark: "oklch(0.72 0.17 15)",  soft: "oklch(0.93 0.04 10)",  softDark: "oklch(0.28 0.08 10)" },
    ink:     { light: "oklch(0.28 0.02 260)", dark: "oklch(0.88 0.01 260)", soft: "oklch(0.9 0.01 260)",  softDark: "oklch(0.30 0.01 260)" }
  };

  const TONE_MAP = {
    punchy: {
      headline: ["Reply to every review in", "10 seconds,", " not 10 ", "minutes."],
      lede: "ReviewHub plugs into the six review sites your customers actually use, drafts the reply in your voice, and posts it the moment you hit send.",
      cta: "Start replying free",
      ctaSub: "Add to Chrome"
    },
    friendly: {
      headline: ["You're running a shop.", " We'll handle the", " inbox."],
      lede: "Every Google, Yelp, Facebook and TripAdvisor review in one place — with a draft reply ready in your voice, on the tab you already had open.",
      cta: "Try it free, no card",
      ctaSub: "Takes 90 seconds"
    },
    technical: {
      headline: ["Six platforms.", " One inbox.", " AI drafts."],
      lede: "ReviewHub aggregates Google, Yelp, Facebook, TripAdvisor, Trustpilot and Wongnai into a single feed. Reply inline via a Chrome extension or bulk via the dashboard.",
      cta: "Install extension",
      ctaSub: "Chrome & Edge"
    }
  };

  function App() {
    const [t, setTweak] = useTweaks(LANDING_DEFAULTS);

    // Apply theme + accent + density as CSS vars
    React.useEffect(() => {
      const root = document.documentElement;
      root.dataset.theme = t.theme;
      const a = ACCENT_MAP[t.accent] || ACCENT_MAP.indigo;
      if (t.theme === "dark") {
        root.style.setProperty("--accent", a.dark);
        root.style.setProperty("--accent-soft", a.softDark);
      } else {
        root.style.setProperty("--accent", a.light);
        root.style.setProperty("--accent-soft", a.soft);
      }
      root.style.setProperty("--density",
        t.density === "tight" ? 0.8 :
        t.density === "spacious" ? 1.15 : 1
      );
    }, [t.theme, t.accent, t.density]);

    // Scroll reveal
    React.useEffect(() => {
      const els = document.querySelectorAll(".reveal");
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("in"); });
      }, { threshold: 0.1 });
      els.forEach(el => io.observe(el));
      return () => io.disconnect();
    }, []);

    const tone = TONE_MAP[t.copyTone] || TONE_MAP.punchy;

    return (
      <React.Fragment>
        <Nav tone={tone} />
        <Hero tone={tone} heroVariant={t.heroVariant} />
        <Platforms />
        <HowItWorks />
        <AiDemo />
        <FeatureGrid />
        <Pricing />
        <Faq />
        <BigCta tone={tone} />
        <Footer />

        <TweaksPanel title="Tweaks" initial={{ x: 24, y: 24, anchor: "br" }}>
          <TweakSection title="Look">
            <TweakRadio
              label="Theme"
              value={t.theme}
              onChange={(v) => setTweak("theme", v)}
              options={[{ value: "light", label: "Light" }, { value: "dark", label: "Dark" }]}
            />
            <TweakRadio
              label="Accent"
              value={t.accent}
              onChange={(v) => setTweak("accent", v)}
              options={[
                { value: "indigo", label: "Indigo" },
                { value: "emerald", label: "Emerald" },
                { value: "amber", label: "Amber" },
                { value: "rose", label: "Rose" },
                { value: "ink", label: "Mono" }
              ]}
            />
            <TweakRadio
              label="Density"
              value={t.density}
              onChange={(v) => setTweak("density", v)}
              options={[
                { value: "tight", label: "Tight" },
                { value: "comfortable", label: "Comfy" },
                { value: "spacious", label: "Spacious" }
              ]}
            />
          </TweakSection>
          <TweakSection title="Content">
            <TweakRadio
              label="Hero"
              value={t.heroVariant}
              onChange={(v) => setTweak("heroVariant", v)}
              options={[
                { value: "live-feed", label: "Live feed" },
                { value: "type-only", label: "Big type" }
              ]}
            />
            <TweakRadio
              label="Tone"
              value={t.copyTone}
              onChange={(v) => setTweak("copyTone", v)}
              options={[
                { value: "punchy", label: "Punchy" },
                { value: "friendly", label: "Friendly" },
                { value: "technical", label: "Technical" }
              ]}
            />
          </TweakSection>
        </TweaksPanel>
      </React.Fragment>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
</body>
</html>
