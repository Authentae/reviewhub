<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PNG favicon fallbacks for browsers without SVG support and for
         iOS / Android home-screen icons. Generated 2026-05-19 from the
         same SVG via the sharp pipeline; regenerate when favicon.svg
         changes:
           cd client && node -e "['public/favicon-32.png',32, 'public/favicon-180.png',180, 'public/favicon-192.png',192, 'public/favicon-512.png',512]" -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <!-- apple-touch-icon must be a flat square — iOS applies its own
         corner-rounding mask. Using favicon-180.png here doubled the
         rounding (rx=14 in SVG + iOS mask). favicon-apple-touch.svg
         renders to a flat 180px square with a centred sparkle for a
         clean iOS Home Screen icon. See cycle 35 of overnight log. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-apple-touch-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReviewHub — AI-drafted Google review replies in your voice, in 10 languages. New reviews ping you on LINE or Telegram, ready to copy and paste in Google. CSV import for Yelp, TripAdvisor, Wongnai, Booking and more. From $14 / ฿499 a month. Free plan, no credit card." />
    <!-- Mobile browsers use this to tint the URL bar. Match the editorial
         brand teal (rh-teal-deep) — was #2563eb (legacy blue) before the
         brand reskin, which made the mobile URL bar disagree with every
         visible surface. light-dark() splits light/dark theme correctly. -->
    <meta name="theme-color" content="#1e4d5e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d2a35" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="index, follow" />
    <!-- Search-engine ownership verification — one-time tags. Once the
         engine has confirmed ownership it can stay (each engine re-checks
         the tag on every recrawl); removing later would require re-verifying.
         Setup walkthrough: docs/free-tools-setup.md -->
    <meta name="google-site-verification" content="tLTker4DVPNQQVffxEF8t6YekekNO1ahgbcKivxerZk" />
    <!-- Bing Webmaster Tools ownership verification. Bing's index feeds
         ChatGPT's web search (per OpenAI), so this matters beyond bing.com
         itself. Verified 2026-05-20 under theearth1659@gmail.com. -->
    <meta name="msvalidate.01" content="B9D88A91413CD3A99B689D6D9BFA49FE" />
    <!-- Ahrefs Webmaster Tools ownership verification. Free for own-site
         only — unlocks backlink data + site audit normally behind a $99+/mo
         paywall. Verified 2026-05-20 under theearth1659@gmail.com. -->

    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="apple-mobile-web-app-title" content="ReviewHub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta property="og:title" content="ReviewHub — AI review replies in 10 seconds" />
    <meta property="og:description" content="AI-drafted Google review replies in 10 languages (EN, TH, JA, ZH, KO + 5 more), in your voice. New reviews ping you on LINE or Telegram with the draft ready to copy. CSV import for Yelp, TripAdvisor, Wongnai and more. From $14 / ฿499 a month. Free plan, no card." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reviewhub.review/" />
    <meta property="og:site_name" content="ReviewHub" />
    <!-- og:image: PNG primary (X/Facebook crawlers don't render SVG reliably),
         SVG kept available at og-image.svg as a high-DPI fallback for crawlers
         that DO support it (LinkedIn, Slack, Discord). Regenerate ALL PNG
         renders from their SVG sources (og-image, og-image-audit, x-header,
         favicons) after editing any SVG:
           node scripts/regen-og-images.js -->
    <meta property="og:image" content="https://reviewhub.review/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ReviewHub — Reply to Google reviews in 10 seconds, from your phone." />
    <meta property="og:locale" content="en_US" />
    <!-- summary_large_image gives ~3x click-through over plain summary on Twitter/X
         and is also what LinkedIn / Slack / LINE / Discord render as a hero card. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReviewHub — Reply to every Google review in 10 seconds" />
    <meta name="twitter:description" content="Reply to Google + Wongnai reviews in 10 seconds. AI drafts replies in 10 languages, in your voice. From $14 / ฿499 a month. Free plan." />
    <meta name="twitter:image" content="https://reviewhub.review/og-image.png" />
    <link rel="canonical" href="https://reviewhub.review/" />
    <!-- Hreflang alternates: ReviewHub ships in 10 languages via the in-app
         language switcher. The site uses a single URL for all locales (the
         language is selected client-side, persisted in localStorage), so
         every alternate points at the canonical. Including this tag still
         tells Google "this page exists in language X" — improves SERP
         targeting for searches in those languages and reduces duplicate-
         content suspicion from auto-translated index entries.
         x-default = root URL for users whose language we don't ship. -->
    <link rel="alternate" hreflang="en" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="th" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="ja" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="ko" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="zh" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="es" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="fr" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="de" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="pt" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="it" href="https://reviewhub.review/" />
    <link rel="alternate" hreflang="x-default" href="https://reviewhub.review/" />
    <!-- Structured data for Google's Knowledge Graph + rich snippets. SoftwareApplication
         lets Google show price + rating in search results once we have aggregate reviews
         to attach. Organization establishes the brand entity. Both are inert until Google
         crawls the site, so they're safe to ship before launch. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "ReviewHub",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://reviewhub.review/",
          "description": "AI-drafted Google review replies in 10 languages, delivered to LINE or Telegram. CSV import for ~20 non-Google review platforms including Yelp, Facebook, TripAdvisor, Trustpilot, Wongnai, Booking, Tabelog, Naver Place, and more."
        },
        {
          "@type": "Organization",
          "name": "ReviewHub",
          "alternateName": "Authentae / ReviewHub",
          "url": "https://reviewhub.review/",
          "logo": "https://reviewhub.review/logo.svg",
          "description": "AI-drafted Google review replies, pushed to LINE / Telegram / WhatsApp (Q3 2026), built for any local business worldwide. 10-language draft support, CSV import for non-Google review platforms.",
          "foundingDate": "2026",
          "foundingLocation": {
            "@type": "Place",
            "name": "Bangkok, Thailand"
          },
          "sameAs": [
            "https://x.com/reviewhubreview",
            "https://github.com/Authentae"
          ],
          "contactPoint": [
            {
              "@type": "ContactPoint",
              "contactType": "customer support",
              "email": "hello@reviewhub.review",
              "availableLanguage": ["English", "Thai"]
            },
            {
              "@type": "ContactPoint",
              "contactType": "security",
              "email": "security@reviewhub.review"
            }
          ]
        },
        {
          "@type": "WebSite",
          "name": "ReviewHub",
          "url": "https://reviewhub.review/",
          "inLanguage": ["en", "th", "ja", "ko", "zh", "es", "fr", "de", "pt", "it"]
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Is there a free plan?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes — our Free plan is permanent, with no credit card required. It supports one business, connects to one platform, and includes 3 AI-drafted responses per month. You can respond manually without limits. Paid plans start at $14/month for unlimited AI drafts, multiple platforms, and advanced features."
              }
            },
            {
              "@type": "Question",
              "name": "Which review platforms do you support?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Google is fully supported via OAuth — reviews sync automatically. We also support manual entry and CSV import for ~20 confirmed non-Google review platforms including Yelp, Facebook, TripAdvisor, Trustpilot, Wongnai (Thailand), Booking.com, Airbnb, Tabelog (Japan), Naver Place (Korea), TheFork (Europe), HolidayCheck (Germany), Reclame Aqui (Brazil), and more. The Business plan unlocks outbound webhooks (Zapier-compatible) and our REST API."
              }
            },
            {
              "@type": "Question",
              "name": "How does AI drafting work?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "We use Claude (by Anthropic) to generate context-aware draft replies based on the review content, sentiment, and your business name. Every draft is editable — you always have the final say before anything is sent. Free plan includes 3 drafts per month; Starter+ plans are unlimited."
              }
            },
            {
              "@type": "Question",
              "name": "Can I cancel anytime?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Cancel from your billing portal in one click. You keep access until the end of your current billing period. Monthly plans have a 30-day refund window on your first payment — no questions asked."
              }
            },
            {
              "@type": "Question",
              "name": "Is my data safe?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Your reviews and customer data stay private. We never sell data. Payment information is handled by LemonSqueezy (our Merchant of Record) — we never see your card details. You can export or permanently delete your data from Settings at any time."
              }
            },
            {
              "@type": "Question",
              "name": "Can I manage multiple locations?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes — the Business plan supports up to 5 businesses under one account, each with separate reviews, templates, and analytics. Switch between locations from the Settings page."
              }
            }
          ]
        }
      ]
    }
    </script>

    <!-- LemonSqueezy Checkout Overlay — loads lemon.js so any anchor with
         class="lemonsqueezy-button" opens checkout as a modal on this domain
         instead of redirecting to reviewhub.lemonsqueezy.com. defer'd so it
         doesn't compete with LCP-critical resources. Falls back gracefully
         to a plain redirect (the anchor's href) if the script fails to load. -->
    <script src="https://assets.lemonsqueezy.com/lemon.js" defer></script>
    <title>ReviewHub — AI Review Replies in 10 Languages</title>
    <script>
      // Two responsibilities, kept inline so they run before React mounts:
      //
      // 1. Prevent the dark/light flash on first paint. ThemeContext does the
      //    same detection once React mounts; doing it here too means the
      //    <html> class is set BEFORE any styles apply — no white flash for
      //    dark-mode users, no dark flash for light-mode users.
      //
      // 2. Inject Plausible analytics on the live production hostname only.
      //    To activate: sign up at plausible.io and add reviewhub.review as
      //    a site. CSP for plausible.io is already pre-allowed in
      //    server/src/app.js (scriptSrc + connectSrc).
      //
      // CSP enforces a sha256 of THIS exact <script> body. Don't change the
      // contents without redeploying — the server hashes the inline block
      // at boot. (See server/src/app.js computeInlineScriptHash.)
      (function () {
        try {
          var stored = localStorage.getItem('reviewhub_theme');
          var dark = stored === 'dark'
            || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
        try {
          var h = window.location.hostname;
          if (h === 'reviewhub.review' || h === 'www.reviewhub.review') {
            var s = document.createElement('script');
            s.defer = true;
            s.setAttribute('data-domain', 'reviewhub.review');
            s.src = 'https://plausible.io/js/script.tagged-events.js';
            document.head.appendChild(s);
          }
        } catch (e) { /* analytics is optional — never crash the page */ }
      })();
    </script>
