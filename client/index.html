<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReviewHub — manage your Google, Yelp, and Facebook reviews in one dashboard. Respond faster with AI-drafted replies, track ratings over time, never miss a customer review." />
    <!-- Mobile browsers use this to tint the URL bar. Match the editorial
         brand teal (rh-teal-deep) — was #2563eb (legacy blue) before the
         brand reskin, which made the mobile URL bar disagree with every
         visible surface. light-dark() splits light/dark theme correctly. -->
    <meta name="theme-color" content="#1e4d5e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d2a35" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="index, follow" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ReviewHub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="ReviewHub" />
    <meta property="og:title" content="ReviewHub — Local Business Review Manager" />
    <meta property="og:description" content="Manage reviews from every major platform in one dashboard. Respond faster with AI-drafted replies. Free plan available." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reviewhub.review/" />
    <meta property="og:site_name" content="ReviewHub" />
    <meta property="og:image" content="https://reviewhub.review/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ReviewHub dashboard showing reviews from Google, Yelp, and Facebook" />
    <meta property="og:locale" content="en_US" />
    <!-- summary_large_image gives ~3x click-through over plain summary on Twitter/X
         and is also what LinkedIn / Slack / LINE / Discord render as a hero card. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReviewHub — Local Business Review Manager" />
    <meta name="twitter:description" content="All your business reviews in one smart dashboard. AI-drafted replies, free plan." />
    <meta name="twitter:image" content="https://reviewhub.review/og-image.png" />
    <link rel="canonical" href="https://reviewhub.review/" />
    <!-- Structured data for Google's Knowledge Graph + rich snippets. SoftwareApplication
         lets Google show price + rating in search results once we have aggregate reviews
         to attach. Organization establishes the brand entity. Both are inert until Google
         crawls the site, so they're safe to ship before launch. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "ReviewHub",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://reviewhub.review/",
          "description": "Manage Google, Yelp, and Facebook reviews in one dashboard with AI-drafted replies.",
          "offers": [
            { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Starter", "price": "14", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Pro", "price": "29", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Business", "price": "59", "priceCurrency": "USD" }
          ]
        },
        {
          "@type": "Organization",
          "name": "ReviewHub",
          "url": "https://reviewhub.review/",
          "logo": "https://reviewhub.review/logo.svg"
        }
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>ReviewHub — Local Business Review Manager</title>
    <script>
      // Prevent the dark/light flash on first paint. ThemeContext does the
      // same detection once React mounts, but running it here too means the
      // <html> class is set BEFORE any styles apply — no white flash for
      // dark-mode users, no dark flash for light-mode users.
      // Keep this tiny and in sync with ThemeContext's logic.
      (function () {
        try {
          var stored = localStorage.getItem('reviewhub_theme');
          var dark = stored === 'dark'
            || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <noscript>
      <div style="max-width:600px;margin:48px auto;padding:24px;font-family:system-ui,sans-serif;border:1px solid #fcd34d;background:#fef3c7;color:#78350f;border-radius:8px">
        <h1 style="margin:0 0 12px;font-size:20px">JavaScript is required</h1>
        <p style="margin:0 0 8px">ReviewHub needs JavaScript to run. Please enable it in your browser settings and reload the page.</p>
        <p style="margin:0;font-size:13px;color:#92400e">If you're using a script blocker, allow scripts from this domain.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
