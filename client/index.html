  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReviewHub — manage your Google, Yelp, and Facebook reviews in one dashboard. Respond faster with AI-drafted replies, track ratings over time, never miss a customer review." />
    <meta name="theme-color" content="#2563eb" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="index, follow" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ReviewHub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <meta property="og:title" content="ReviewHub — Local Business Review Manager" />
    <meta property="og:description" content="Manage reviews from every major platform in one dashboard. Respond faster with AI-drafted replies. Free plan available." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reviewhub.app/" />
    <meta property="og:site_name" content="ReviewHub" />
    <meta name="twitter:card" content="summary" />
    <link rel="canonical" href="https://reviewhub.app/" />
    <meta name="twitter:title" content="ReviewHub" />
    <meta name="twitter:description" content="All your business reviews in one smart dashboard." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>ReviewHub — Local Business Review Manager</title>
    <script>
      // Prevent the dark/light flash on first paint. ThemeContext does the
      // same detection once React mounts, but running it here too means the
      // <html> class is set BEFORE any styles apply — no white flash for
      // dark-mode users, no dark flash for light-mode users.
      // Keep this tiny and in sync with ThemeContext's logic.
      (function () {
        try {
          var stored = localStorage.getItem('reviewhub_theme');
          var dark = stored === 'dark'
            || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <noscript>
      <div style="max-width:600px;margin:48px auto;padding:24px;font-family:system-ui,sans-serif;border:1px solid #fcd34d;background:#fef3c7;color:#78350f;border-radius:8px">
        <h1 style="margin:0 0 12px;font-size:20px">JavaScript is required</h1>
        <p style="margin:0 0 8px">ReviewHub needs JavaScript to run. Please enable it in your browser settings and reload the page.</p>
        <p style="margin:0;font-size:13px;color:#92400e">If you're using a script blocker, allow scripts from this domain.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
