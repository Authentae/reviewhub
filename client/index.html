<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ReviewHub — manage your Google reviews in one dashboard, reply faster with AI-drafted responses (Thai or English), track ratings over time. Yelp, Facebook, and more coming soon." />
    <!-- Mobile browsers use this to tint the URL bar. Match the editorial
         brand teal (rh-teal-deep) — was #2563eb (legacy blue) before the
         brand reskin, which made the mobile URL bar disagree with every
         visible surface. light-dark() splits light/dark theme correctly. -->
    <meta name="theme-color" content="#1e4d5e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d2a35" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="robots" content="index, follow" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ReviewHub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="ReviewHub" />
    <meta property="og:title" content="ReviewHub — Reply to every Google review in 10 seconds" />
    <meta property="og:description" content="Pull all your Google reviews into one dashboard. AI drafts a reply in your voice — Thai or English. You tap copy, paste on Google, done. Yelp, Facebook, and more coming soon. Free plan, no credit card." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reviewhub.review/" />
    <meta property="og:site_name" content="ReviewHub" />
    <!-- og:image was previously /og-image.png, which never existed in the
         repo or in production — every social share returned 404 and rendered
         a text-only card. Now points at /og-image.svg, a static brand card
         in the editorial palette. Most modern crawlers (LinkedIn, Slack,
         Discord, WhatsApp, iMessage) render SVG OG images; older Twitter
         and Facebook may show no image, which is still strictly better than
         the previous 404 (gives the headline + description to render).
         When a designer ships a real PNG, swap this path. -->
    <meta property="og:image" content="https://reviewhub.review/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ReviewHub — All your reviews, one editorial dashboard." />
    <meta property="og:locale" content="en_US" />
    <!-- summary_large_image gives ~3x click-through over plain summary on Twitter/X
         and is also what LinkedIn / Slack / LINE / Discord render as a hero card. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ReviewHub — Reply to every Google review in 10 seconds" />
    <meta name="twitter:description" content="Pull all your Google reviews into one dashboard. AI drafts a reply in your voice — Thai or English. Free plan, no card." />
    <meta name="twitter:image" content="https://reviewhub.review/og-image.svg" />
    <link rel="canonical" href="https://reviewhub.review/" />
    <!-- Structured data for Google's Knowledge Graph + rich snippets. SoftwareApplication
         lets Google show price + rating in search results once we have aggregate reviews
         to attach. Organization establishes the brand entity. Both are inert until Google
         crawls the site, so they're safe to ship before launch. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "ReviewHub",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "url": "https://reviewhub.review/",
          "description": "Manage Google reviews in one dashboard with AI-drafted replies (Thai or English). Yelp, Facebook, and more platforms coming soon.",
          "offers": [
            { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Starter", "price": "14", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Pro", "price": "29", "priceCurrency": "USD" },
            { "@type": "Offer", "name": "Business", "price": "59", "priceCurrency": "USD" }
          ]
        },
        {
          "@type": "Organization",
          "name": "ReviewHub",
          "url": "https://reviewhub.review/",
          "logo": "https://reviewhub.review/logo.svg"
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Is there a free plan?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes — our Free plan is permanent, with no credit card required. It supports one business, connects to one platform, and includes 3 AI-drafted responses per month. You can respond manually without limits. Paid plans start at $14/month for unlimited AI drafts, multiple platforms, and advanced features."
              }
            },
            {
              "@type": "Question",
              "name": "Which review platforms do you support?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Today, Google is fully supported via OAuth — reviews sync automatically. Yelp, Facebook, TripAdvisor, Trustpilot, and Wongnai are coming soon. You can also import reviews via CSV today, or use our API/webhooks on the Business plan."
              }
            },
            {
              "@type": "Question",
              "name": "How does AI drafting work?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "We use Claude (by Anthropic) to generate context-aware draft replies based on the review content, sentiment, and your business name. Every draft is editable — you always have the final say before anything is sent. Free plan includes 3 drafts per month; Starter+ plans are unlimited."
              }
            },
            {
              "@type": "Question",
              "name": "Can I cancel anytime?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Cancel from your billing portal in one click. You keep access until the end of your current billing period. Monthly plans have a 30-day refund window on your first payment — no questions asked."
              }
            },
            {
              "@type": "Question",
              "name": "Is my data safe?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Your reviews and customer data stay private. We never sell data. Payment information is handled by LemonSqueezy (our Merchant of Record) — we never see your card details. You can export or permanently delete your data from Settings at any time."
              }
            },
            {
              "@type": "Question",
              "name": "Can I manage multiple locations?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes — the Business plan supports up to 5 businesses under one account, each with separate reviews, templates, and analytics. Switch between locations from the Settings page."
              }
            }
          ]
        }
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>ReviewHub — Local Business Review Manager</title>
    <script>
      // Prevent the dark/light flash on first paint. ThemeContext does the
      // same detection once React mounts, but running it here too means the
      // <html> class is set BEFORE any styles apply — no white flash for
      // dark-mode users, no dark flash for light-mode users.
      // Keep this tiny and in sync with ThemeContext's logic.
      (function () {
        try {
          var stored = localStorage.getItem('reviewhub_theme');
          var dark = stored === 'dark'
            || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>

    <!-- ============================================================
         ANALYTICS PLACEHOLDER — drop your snippet RIGHT HERE
         ============================================================
         When you sign up for Plausible or Umami, paste their script
         tag right after this comment block.

         For Plausible Cloud (recommended):
           <script defer data-domain="reviewhub.review"
                   src="https://plausible.io/js/script.js"></script>

         For Umami self-hosted:
           <script defer src="https://your-umami-host/script.js"
                   data-website-id="YOUR-ID"></script>

         IMPORTANT — also update server/src/app.js helmet CSP:
           - add the analytics origin to scriptSrc
             e.g. scriptSrc: ["'self'", INLINE_SCRIPT_HASH,
                              'https://plausible.io']
           - add the same origin to connectSrc so the tracker can POST
             events back:  connectSrc: ["'self'", 'https://plausible.io']

         Without those CSP changes the tracker will load BUT the
         browser will block the outbound event request (you'll see
         the script in DevTools but no data in the dashboard).
         ============================================================ -->

  </head>
  <body>
    <noscript>
      <div style="max-width:600px;margin:48px auto;padding:24px;font-family:system-ui,sans-serif;border:1px solid #fcd34d;background:#fef3c7;color:#78350f;border-radius:8px">
        <h1 style="margin:0 0 12px;font-size:20px">JavaScript is required</h1>
        <p style="margin:0 0 8px">ReviewHub needs JavaScript to run. Please enable it in your browser settings and reload the page.</p>
        <p style="margin:0;font-size:13px;color:#92400e">If you're using a script blocker, allow scripts from this domain.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
