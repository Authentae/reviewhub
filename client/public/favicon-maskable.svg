<!-- Maskable-safe variant of favicon.svg.
     iOS adaptive icons + Android dynamic-color theming crop the icon to
     an inner ~80% safe zone (Web App Manifest "maskable" purpose spec).
     favicon.svg has the sparkle at full bleed (great as a regular icon,
     but the edges of the larger sparkle and the second decorative star
     get cropped on iOS Home Screen).

     This variant:
       - Full-bleed teal background (so the cropped corners stay branded)
       - Inner sparkle scaled to 64% of canvas (fits comfortably inside
         the 80% safe zone with room to breathe)
       - Single sparkle, centred — the secondary star from favicon.svg
         is dropped because at maskable scale it would crop awkwardly.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="rh-mask-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e4d5e"/>
      <stop offset="1" stop-color="#2c7889"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background. No rounded corners — iOS masks the rect
       into a squircle / Android into a circle, so the corner radius
       in the SVG is irrelevant for maskable purpose. -->
  <rect width="64" height="64" fill="url(#rh-mask-grad)"/>
  <!-- Single centred sparkle at 64% scale. Path is the favicon.svg
       primary sparkle scaled around its centre (32, 24) and pulled in
       toward the canvas centre (32, 32). -->
  <g transform="translate(32 32) scale(0.7) translate(-32 -24)">
    <path d="M32 10c1.5 10 4 12.5 14 14-10 1.5-12.5 4-14 14-1.5-10-4-12.5-14-14 10-1.5 12.5-4 14-14z" fill="#fbf8f1"/>
  </g>
</svg>
