<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- ReviewHub avatar — square 400×400 monogram in brand teal palette.
       Centered sparkle tile + "RH" wordmark beneath. Mirrors the og-image
       sparkle-and-wordmark pattern. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#f3ecdb"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e4d5e"/>
      <stop offset="1" stop-color="#2c7889"/>
    </linearGradient>
  </defs>

  <!-- Background — warm paper -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Sparkle tile centered horizontally, slightly above center -->
  <g transform="translate(125 80)">
    <rect width="150" height="150" rx="34" fill="url(#tile)"/>
    <path d="M75 22c3.5 23.5 9.4 29.4 32.8 32.8C84.4 58.6 78.5 64.5 75 88c-3.5-23.5-9.4-29.4-32.8-32.8C65.6 51.4 71.5 45.5 75 22z" fill="#fbf8f1"/>
    <path d="M112 92c1.6 9.4 3.8 11.5 12.9 12.9-9.1 1.4-11.3 3.5-12.9 12.9-1.4-9.4-3.5-11.5-12.9-12.9 9.4-1.4 11.5-3.5 12.9-12.9z" fill="#fbf8f1" opacity="0.95"/>
  </g>

  <!-- Wordmark beneath -->
  <text x="200" y="305" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-size="60" fill="#1d242c">Review<tspan font-style="italic" fill="#1e4d5e">Hub</tspan></text>
</svg>
