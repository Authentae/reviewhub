<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <!-- ReviewHub X/Twitter header — 1500×500 wide aspect.
       Editorial composition: large headline + sub-line, brand sparkle
       accent on the right. Same palette + serif treatment as the
       marketing site. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#f3ecdb"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e4d5e"/>
      <stop offset="1" stop-color="#2c7889"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Sparkle tile cluster on right (decorative) -->
  <g transform="translate(1140 110)">
    <rect width="220" height="220" rx="48" fill="url(#tile)"/>
    <path d="M110 32c5 35 14 44 49 49-35 5-44 14-49 49-5-35-14-44-49-49 35-5 44-14 49-49z" fill="#fbf8f1"/>
    <path d="M165 140c2.5 14 5.6 17 19.3 19.3-13.7 2.1-16.8 5.3-19.3 19.3-2.1-14-5.3-17-19.3-19.3 14-2.1 17-5.3 19.3-19.3z" fill="#fbf8f1" opacity="0.95"/>
  </g>

  <!-- Eyebrow -->
  <text x="100" y="160" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" fill="#c48a2c" letter-spacing="3">REVIEWHUB · BANGKOK</text>

  <!-- Headline (Instrument Serif) -->
  <text x="100" y="250" font-family="'Instrument Serif', Georgia, serif" font-size="78" fill="#1d242c">Reply to every review</text>
  <text x="100" y="332" font-family="'Instrument Serif', Georgia, serif" font-size="78" font-style="italic" fill="#1e4d5e">in 10 seconds.</text>

  <!-- Sub-line -->
  <text x="100" y="400" font-family="'Inter Tight', -apple-system, system-ui, sans-serif" font-size="26" fill="#1d242c" opacity="0.7">AI-drafted Google review replies in your voice.</text>
  <text x="100" y="438" font-family="'Inter Tight', -apple-system, system-ui, sans-serif" font-size="26" fill="#1d242c" opacity="0.7">Free plan · $14/mo · reviewhub.review</text>
</svg>
