<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Editorial palette: rh-cream background, rh-teal-deep accent, rh-ink text. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f1"/>
      <stop offset="1" stop-color="#f3ecdb"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e4d5e"/>
      <stop offset="1" stop-color="#2c7889"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Sparkle logo tile -->
  <g transform="translate(96 96)">
    <rect width="160" height="160" rx="36" fill="url(#tile)"/>
    <path d="M80 25c3.75 25 10 31.25 35 35-25 3.75-31.25 10-35 35-3.75-25-10-31.25-35-35 25-3.75 31.25-10 35-35z" fill="#fbf8f1"/>
    <path d="M120 100c1.75 10 4 12.25 13.75 13.75-9.75 1.5-12 3.75-13.75 13.75-1.5-10-3.75-12.25-13.75-13.75 10-1.5 12.25-3.75 13.75-13.75z" fill="#fbf8f1" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="290" y="200" font-family="'Instrument Serif', Georgia, serif" font-size="76" fill="#1d242c">Review<tspan font-style="italic">Hub</tspan></text>

  <!-- Headline -->
  <text x="96" y="360" font-family="'Inter Tight', -apple-system, system-ui, sans-serif" font-size="64" font-weight="700" fill="#1d242c">All your reviews,</text>
  <text x="96" y="438" font-family="'Inter Tight', -apple-system, system-ui, sans-serif" font-size="64" font-weight="700" fill="#1e4d5e">one editorial dashboard.</text>

  <!-- Sub-line -->
  <text x="96" y="510" font-family="'Inter Tight', -apple-system, system-ui, sans-serif" font-size="28" font-weight="400" fill="#1d242c" opacity="0.7">Google · Yelp · Facebook · TripAdvisor — AI-drafted replies, free plan.</text>

  <!-- Footer URL -->
  <text x="96" y="580" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" fill="#1d242c" opacity="0.55">reviewhub.review</text>
</svg>
