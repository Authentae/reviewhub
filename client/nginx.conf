# nginx config for the ReviewHub SPA.
#
# Responsibilities:
#   - Serve the built Vite bundle from /usr/share/nginx/html
#   - SPA fallback: any non-file URL falls through to index.html so
#     /dashboard, /settings, /reset-password?token=... all hydrate client-side
#   - Long-cache the hashed asset bundles (Vite's /assets/*-<hash>.{js,css})
#     while never caching index.html itself
#   - Baseline security headers (app.js CSP applies to API; the SPA gets
#     its own via nginx since CSP must travel with the HTML)

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed static assets — safe to cache for a year because the hash in the
  # filename changes on content change. Immutable lets the browser skip even
  # the conditional revalidation.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Static files with well-known suffixes — cache a day; they're typically
  # overwritten on deploy but aren't hashed.
  location ~* \.(?:svg|ico|webp|png|jpg|jpeg|gif|woff2?|ttf)$ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # HTML must never cache at the edge. The inline theme-flash script depends
  # on the live current HTML, and deploys need immediate propagation.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback: unknown URLs serve index.html so the React router
  # can resolve them client-side.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Baseline security headers. CSP includes the sha256 hash of the inline
  # theme-flash script from index.html — if you change that script, recompute
  # with:
  #   node -e "console.log('sha256-'+require('crypto').createHash('sha256').update(require('fs').readFileSync('client/index.html','utf8').match(/<script>([\s\S]*?)<\/script>/)[1]).digest('base64'))"
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), serial=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-56TOw150PJQmxnQA760y2qTxuksOALKymeXC2YC+rm8='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

  # Hide nginx version from the Server header
  server_tokens off;

  # Gzip — we don't ship brotli here, but nginx:alpine's mainline gzip is fine
  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_vary on;
  gzip_min_length 1024;
}
