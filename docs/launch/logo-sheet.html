<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ReviewHub — Logo concepts</title>
<style>
  body { margin: 0; background: #fafbfc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #0f172a; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; padding: 32px; max-width: 1600px; margin: 0 auto; }
  .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; overflow: hidden; }
  .big { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; padding: 26px; background: linear-gradient(135deg, #f8fafc, #eef2ff); }
  .meta { padding: 14px 16px 16px; border-top: 1px solid #f1f5f9; }
  .name { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .desc { font-size: 11.5px; line-height: 1.45; color: #64748b; margin: 4px 0 10px; }
  .sizes { display: flex; align-items: center; gap: 14px; padding-top: 8px; border-top: 1px dashed #e2e8f0; }
  .size-label { font-size: 10px; color: #94a3b8; font-variant-numeric: tabular-nums; }
  .mono-row { display: flex; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e2e8f0; align-items: center; }
  .mono-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; }
  h1 { padding: 32px 32px 0; margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { padding: 4px 32px 0; margin: 0; font-size: 13px; color: #64748b; }
</style>
</head>
<body>
<h1>ReviewHub logo concepts</h1>
<p class="sub">Each renders cleanly at 128×128 and 16×16. Monochrome version on right.</p>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="logo.jsx"></script>
<script type="text/babel">
function Card({ id, name, description, Component }) {
  return (
    <div className="card">
      <div className="big"><Component size={140} /></div>
      <div className="meta">
        <div className="name">{id.toUpperCase()} · {name}</div>
        <div className="desc">{description}</div>
        <div className="sizes">
          <Component size={48} /><span className="size-label">48px</span>
          <Component size={32} /><span className="size-label">32px</span>
          <Component size={16} /><span className="size-label">16px favicon</span>
        </div>
        <div className="mono-row">
          <span className="mono-label">Mono</span>
          <Component size={32} mono /><Component size={16} mono />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="grid">{LOGO_CONCEPTS.map(c => <Card key={c.id} {...c} />)}</div>
);
</script>
</body>
</html>
